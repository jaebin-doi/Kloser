<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>고객 관리 — Kloser</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="_shared.css" />
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Pretendard Variable', 'Pretendard', 'Inter', 'system-ui', 'sans-serif'] } } } };
  </script>
  <style>
    body { overflow: hidden; }
    .filter-chip { padding: 6px 11px; border-radius: 7px; font-size: .76rem; font-weight: 600; color: rgb(71 85 105); border: 1px solid rgb(226 232 240); background: white; cursor: pointer; transition: all .15s; }
    .filter-chip.active { background: rgb(37 99 235); color: white; border-color: rgb(37 99 235); }
    .filter-chip:hover:not(.active) { background: rgb(248 250 252); }

    .modal-bg { position: fixed; inset: 0; background: rgba(15,23,42,.5); z-index: 100; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-bg.show { display: flex; }
    .modal-card { background: white; border-radius: 16px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 60px -12px rgba(15,23,42,.25); }
  </style>
</head>

<body class="bg-slate-50">

  <div class="flex h-screen">
    <div id="sidebarSlot"></div>

    <div class="flex-1 flex flex-col min-w-0">

      <!-- Topbar -->
      <header class="h-[60px] px-4 lg:px-6 flex items-center justify-between bg-white border-b border-slate-200 flex-shrink-0">
        <div class="flex items-center gap-3 min-w-0">
          <button onclick="toggleSidebar()" class="mobile-menu-btn w-9 h-9 rounded-lg hover:bg-slate-100 items-center justify-center text-slate-600" style="display:none">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="text-[1rem] font-black tracking-tight text-slate-800 truncate">고객 관리</h1>
          <span class="text-[.7rem] text-slate-400 tnum hidden sm:inline">총 <span id="totalCount">2,486</span>명</span>
        </div>
        <div class="flex items-center gap-2">
          <button class="btn-secondary hidden sm:inline-flex">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            내보내기
          </button>
          <button onclick="openModal()" class="btn-primary">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            고객 추가
          </button>
        </div>
      </header>

      <main class="flex-1 flex flex-col overflow-hidden">

        <!-- Stats strip -->
        <section class="grid grid-cols-2 sm:grid-cols-4 gap-0 bg-white border-b border-slate-200 flex-shrink-0">
          <div class="p-4 lg:p-5 border-r border-slate-200">
            <div class="text-[.62rem] font-bold tracking-wider uppercase text-slate-500 mb-1.5">전체 고객</div>
            <div class="text-[1.4rem] font-black tnum tracking-tight text-slate-800">2,486</div>
            <div class="text-[.68rem] text-emerald-600 font-bold tnum mt-0.5">+ 24 이번 주</div>
          </div>
          <div class="p-4 lg:p-5 border-r border-slate-200">
            <div class="text-[.62rem] font-bold tracking-wider uppercase text-slate-500 mb-1.5">활성</div>
            <div class="text-[1.4rem] font-black tnum tracking-tight text-emerald-600">1,892</div>
            <div class="text-[.68rem] text-slate-500 tnum mt-0.5">76.1%</div>
          </div>
          <div class="p-4 lg:p-5 sm:border-r border-slate-200">
            <div class="text-[.62rem] font-bold tracking-wider uppercase text-slate-500 mb-1.5">검토중</div>
            <div class="text-[1.4rem] font-black tnum tracking-tight text-amber-600">312</div>
            <div class="text-[.68rem] text-slate-500 tnum mt-0.5">12.6%</div>
          </div>
          <div class="p-4 lg:p-5">
            <div class="text-[.62rem] font-bold tracking-wider uppercase text-slate-500 mb-1.5">대기</div>
            <div class="text-[1.4rem] font-black tnum tracking-tight text-slate-700">282</div>
            <div class="text-[.68rem] text-slate-500 tnum mt-0.5">11.3%</div>
          </div>
        </section>

        <!-- Filters -->
        <div class="px-4 lg:px-6 py-3 border-b border-slate-200 bg-white flex items-center gap-2 flex-wrap lg:justify-between flex-shrink-0">
          <div class="relative w-full lg:w-auto lg:max-w-xs">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
            <input type="text" id="searchInput" placeholder="이름, 회사, 이메일 검색"
              class="w-full pl-9 pr-3 py-2 rounded-lg border border-slate-200 bg-white text-[.82rem] outline-none focus:border-blue-400 focus:shadow-[0_0_0_4px_rgba(59,130,246,.12)] transition-all" />
          </div>
          <div class="flex items-center gap-1.5 flex-wrap">
            <button class="filter-chip active" data-filter="all">전체</button>
            <button class="filter-chip" data-filter="active">활성</button>
            <button class="filter-chip" data-filter="review">검토중</button>
            <button class="filter-chip" data-filter="pending">대기</button>
            <button class="filter-chip" data-filter="enterprise">Enterprise</button>
            <button class="filter-chip" data-filter="recent">최근 연락</button>
          </div>
        </div>

        <!-- Table -->
        <div class="flex-1 overflow-y-auto scroll-area">
          <table class="tbl">
            <thead class="sticky top-0 z-10 bg-white">
              <tr>
                <th class="w-10"><input type="checkbox" class="rounded accent-blue-600"/></th>
                <th>고객</th>
                <th class="hidden sm:table-cell">회사</th>
                <th class="hidden md:table-cell">이메일</th>
                <th>상태</th>
                <th class="hidden lg:table-cell">플랜</th>
                <th class="hidden xl:table-cell">마지막 연락</th>
                <th class="w-12"></th>
              </tr>
            </thead>
            <tbody id="customersTable"></tbody>
          </table>
        </div>

      </main>
    </div>
  </div>

  <!-- Add customer modal -->
  <div id="modal" class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal-card">
      <div class="px-6 py-5 border-b border-slate-200 flex items-center justify-between">
        <h2 class="text-[1.05rem] font-black tracking-tight text-slate-800">새 고객 추가</h2>
        <button onclick="closeModal()" class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-500 transition-colors">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="p-6 space-y-4">
        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="text-[.72rem] font-bold text-slate-600 mb-1.5 block">이름 <span class="text-rose-500">*</span></label>
            <input id="newName" class="w-full px-3 py-2.5 rounded-lg border border-slate-200 outline-none focus:border-blue-400 text-[.85rem]" placeholder="홍길동" />
          </div>
          <div>
            <label class="text-[.72rem] font-bold text-slate-600 mb-1.5 block">회사</label>
            <input id="newCompany" class="w-full px-3 py-2.5 rounded-lg border border-slate-200 outline-none focus:border-blue-400 text-[.85rem]" placeholder="(주)클로저" />
          </div>
        </div>
        <div>
          <label class="text-[.72rem] font-bold text-slate-600 mb-1.5 block">이메일 <span class="text-rose-500">*</span></label>
          <input id="newEmail" type="email" class="w-full px-3 py-2.5 rounded-lg border border-slate-200 outline-none focus:border-blue-400 text-[.85rem]" placeholder="name@company.com" />
        </div>
        <div class="grid sm:grid-cols-2 gap-4">
          <div>
            <label class="text-[.72rem] font-bold text-slate-600 mb-1.5 block">전화번호</label>
            <input id="newPhone" class="w-full px-3 py-2.5 rounded-lg border border-slate-200 outline-none focus:border-blue-400 text-[.85rem]" placeholder="010-0000-0000" />
          </div>
          <div>
            <label class="text-[.72rem] font-bold text-slate-600 mb-1.5 block">상태</label>
            <select id="newStatus" class="w-full px-3 py-2.5 rounded-lg border border-slate-200 outline-none focus:border-blue-400 text-[.85rem] bg-white">
              <option value="active">활성</option>
              <option value="review">검토중</option>
              <option value="pending">대기</option>
            </select>
          </div>
        </div>
        <div>
          <label class="text-[.72rem] font-bold text-slate-600 mb-1.5 block">메모</label>
          <textarea id="newMemo" rows="3" class="w-full px-3 py-2.5 rounded-lg border border-slate-200 outline-none focus:border-blue-400 text-[.85rem] resize-none" placeholder="관심 플랜, 특이사항 등"></textarea>
        </div>
      </div>
      <div class="px-6 py-4 border-t border-slate-200 flex gap-2 justify-end">
        <button onclick="closeModal()" class="btn-secondary">취소</button>
        <button onclick="addCustomer()" class="btn-primary">고객 추가</button>
      </div>
    </div>
  </div>

  <script src="_shared.js"></script>
  <script>
    renderSidebar('customers');

    const planColors = {
      Enterprise: 'badge-violet',
      Pro: 'badge-blue',
      Starter: 'badge-slate',
      '-': 'badge-slate',
    };
    const statusColors = {
      active: { c: 'badge-emerald', l: '활성' },
      review: { c: 'badge-amber', l: '검토중' },
      pending: { c: 'badge-slate', l: '대기' },
    };
    const avatars = ['bg-violet-500','bg-rose-500','bg-emerald-500','bg-amber-500','bg-blue-500','bg-cyan-500','bg-pink-500','bg-teal-500'];

    let customers = [
      { name: '김민수', company: 'Kloser Inc.', email: 'kim@kloser.com', phone: '010-1234-5678', status: 'active', plan: 'Pro', last: '2시간 전' },
      { name: '이지은', company: 'DesignCo.', email: 'lee@designco.kr', phone: '010-2345-6789', status: 'review', plan: 'Pro', last: '오늘 09:48' },
      { name: '박서준', company: 'Nexus Lab', email: 'park@nexuslab.io', phone: '010-3456-7890', status: 'active', plan: 'Enterprise', last: '오늘 09:12' },
      { name: '정유진', company: 'TerraBase', email: 'jung@terrabase.kr', phone: '010-4567-8901', status: 'active', plan: 'Enterprise', last: '오늘 08:55' },
      { name: '최서연', company: 'OrbitLab', email: 'choi@orbitlab.com', phone: '010-5678-9012', status: 'pending', plan: '-', last: '어제' },
      { name: '강지훈', company: 'SkyNode', email: 'kang@skynode.kr', phone: '010-6789-0123', status: 'active', plan: 'Pro', last: '어제' },
      { name: '한수민', company: 'GridWorks', email: 'han@gridworks.io', phone: '010-7890-1234', status: 'review', plan: '-', last: '2일 전' },
      { name: '윤서아', company: 'MapCore', email: 'yoon@mapcore.kr', phone: '010-8901-2345', status: 'active', plan: 'Enterprise', last: '2일 전' },
      { name: '조성훈', company: 'DOI', email: 'cjb@doi-kr.com', phone: '010-9012-3456', status: 'active', plan: 'Pro', last: '3일 전' },
      { name: '신예린', company: 'DataFlow', email: 'shin@dataflow.kr', phone: '010-0123-4567', status: 'pending', plan: '-', last: '1주 전' },
      { name: '오민재', company: 'Pulsar', email: 'oh@pulsar.io', phone: '010-1357-2468', status: 'review', plan: 'Pro', last: '1주 전' },
      { name: '임채영', company: 'Helix Group', email: 'lim@helix.co', phone: '010-2468-1357', status: 'active', plan: 'Enterprise', last: '2주 전' },
    ];

    let activeFilter = 'all';
    let activeSearch = '';

    function avatarFor(name) {
      const idx = (name.charCodeAt(0) + name.charCodeAt(name.length-1)) % avatars.length;
      return avatars[idx];
    }

    function renderTable() {
      const el = document.getElementById('customersTable');
      el.innerHTML = '';
      const q = activeSearch.toLowerCase();
      const filtered = customers.filter(c => {
        if (q && !(c.name.toLowerCase().includes(q) || c.company.toLowerCase().includes(q) || c.email.toLowerCase().includes(q))) return false;
        if (activeFilter === 'active' && c.status !== 'active') return false;
        if (activeFilter === 'review' && c.status !== 'review') return false;
        if (activeFilter === 'pending' && c.status !== 'pending') return false;
        if (activeFilter === 'enterprise' && c.plan !== 'Enterprise') return false;
        return true;
      });
      if (filtered.length === 0) {
        el.innerHTML = `<tr><td colspan="8" class="text-center text-slate-400 py-12 text-[.85rem]">검색 결과가 없습니다.</td></tr>`;
        return;
      }
      filtered.forEach(c => {
        const tr = document.createElement('tr');
        const st = statusColors[c.status];
        tr.innerHTML = `
          <td onclick="event.stopPropagation()"><input type="checkbox" class="rounded accent-blue-600"/></td>
          <td>
            <div class="flex items-center gap-2.5 min-w-0">
              <div class="w-8 h-8 rounded-full ${avatarFor(c.name)} flex items-center justify-center text-[.7rem] font-black text-white shrink-0">${c.name.slice(0,1)}</div>
              <div class="min-w-0">
                <div class="font-bold text-slate-800 text-[.85rem] truncate">${c.name}</div>
                <div class="text-[.68rem] text-slate-400 truncate sm:hidden">${c.company}</div>
              </div>
            </div>
          </td>
          <td class="hidden sm:table-cell text-slate-700 text-[.82rem]">${c.company}</td>
          <td class="hidden md:table-cell text-slate-600 text-[.78rem] truncate">${c.email}</td>
          <td><span class="badge ${st.c}">${st.l}</span></td>
          <td class="hidden lg:table-cell"><span class="badge ${planColors[c.plan]}">${c.plan}</span></td>
          <td class="hidden xl:table-cell text-slate-500 text-[.78rem]">${c.last}</td>
          <td onclick="event.stopPropagation()" class="text-right">
            <button class="w-7 h-7 rounded hover:bg-slate-100 flex items-center justify-center text-slate-400 transition-colors">
              <svg width="14" height="14" fill="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="6" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="18" r="1.5"/></svg>
            </button>
          </td>
        `;
        el.appendChild(tr);
      });
    }
    renderTable();

    document.getElementById('searchInput').addEventListener('input', (e) => {
      activeSearch = e.target.value; renderTable();
    });
    document.querySelectorAll('.filter-chip').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(x => x.classList.remove('active'));
        b.classList.add('active');
        activeFilter = b.dataset.filter;
        renderTable();
      });
    });

    function openModal() { document.getElementById('modal').classList.add('show'); }
    function closeModal() { document.getElementById('modal').classList.remove('show'); }
    function addCustomer() {
      const name = document.getElementById('newName').value.trim();
      const email = document.getElementById('newEmail').value.trim();
      if (!name || !email) { alert('이름과 이메일은 필수 입력입니다.'); return; }
      const company = document.getElementById('newCompany').value.trim() || '-';
      const phone = document.getElementById('newPhone').value.trim();
      const status = document.getElementById('newStatus').value;
      customers.unshift({ name, company, email, phone, status, plan: '-', last: '방금 전' });
      const total = parseInt(document.getElementById('totalCount').textContent.replace(/,/g, '')) + 1;
      document.getElementById('totalCount').textContent = total.toLocaleString();
      ['newName','newCompany','newEmail','newPhone','newMemo'].forEach(id => document.getElementById(id).value = '');
      closeModal();
      renderTable();
    }
    window.openModal = openModal; window.closeModal = closeModal; window.addCustomer = addCustomer;
  </script>
</body>
</html>
