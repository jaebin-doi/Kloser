<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>팀 보고서 — Kloser</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="_shared.css" />
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Pretendard Variable', 'Pretendard', 'Inter', 'system-ui', 'sans-serif'] } } } };
  </script>
  <style>
    body { overflow: hidden; }
    main.scroll-area { overflow-y: auto; }
  </style>
</head>

<body class="bg-slate-50">

  <div class="flex h-screen">
    <div id="sidebarSlot"></div>

    <div class="flex-1 flex flex-col min-w-0">

      <header class="h-[60px] px-4 lg:px-6 flex items-center justify-between bg-white border-b border-slate-200 flex-shrink-0">
        <div class="flex items-center gap-3 min-w-0">
          <button onclick="toggleSidebar()" class="mobile-menu-btn w-9 h-9 rounded-lg hover:bg-slate-100 items-center justify-center text-slate-600" style="display:none">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="text-[1rem] font-black tracking-tight text-slate-800 truncate">팀 보고서</h1>
          <span id="scopeBadge" class="badge badge-slate hidden">—</span>
        </div>
        <div class="flex items-center gap-2">
          <button id="reloadBtn" class="px-3 h-9 rounded-lg border border-slate-200 hover:bg-slate-100 text-[.78rem] font-bold text-slate-700">
            새로고침
          </button>
        </div>
      </header>

      <main class="flex-1 overflow-y-auto scroll-area p-4 lg:p-6 space-y-5 lg:space-y-6">

        <!-- Status banner (loading / forbidden / not-found / error) -->
        <section id="statusBanner" class="hidden rounded-xl border bg-white p-4 text-[.85rem] text-slate-700"></section>

        <!-- Header card -->
        <section id="headerCard" class="rounded-2xl border border-slate-200 bg-white p-5 lg:p-7 shadow-sm hidden">
          <div class="text-[.7rem] text-slate-400" id="generatedAtLabel">—</div>
          <h2 class="text-[1.2rem] lg:text-[1.4rem] font-black tracking-tight text-slate-800 mt-1">
            <span id="scopeTitle">팀 보고서</span>
          </h2>
          <p class="text-[.85rem] text-slate-500 mt-1.5" id="scopeDesc">데이터를 불러오는 중…</p>
        </section>

        <!-- KPI cards -->
        <section id="kpiSection" class="grid grid-cols-2 lg:grid-cols-5 gap-3 lg:gap-4 hidden">
          <div class="rounded-xl border border-slate-200 bg-white p-4">
            <div class="text-[.62rem] font-bold tracking-wider uppercase text-slate-500 mb-2">전체 통화</div>
            <div id="kpiTotal" class="text-[1.4rem] font-black tnum tracking-tight text-slate-800">—</div>
          </div>
          <div class="rounded-xl border border-slate-200 bg-white p-4">
            <div class="text-[.62rem] font-bold tracking-wider uppercase text-slate-500 mb-2">완료</div>
            <div id="kpiEnded" class="text-[1.4rem] font-black tnum tracking-tight text-slate-800">—</div>
          </div>
          <div class="rounded-xl border border-slate-200 bg-white p-4">
            <div class="text-[.62rem] font-bold tracking-wider uppercase text-slate-500 mb-2">응답률</div>
            <div id="kpiResponseRate" class="text-[1.4rem] font-black tnum tracking-tight text-slate-800">—</div>
            <div class="text-[.65rem] text-slate-400 font-bold mt-1">완료 / (완료 + 미수신)</div>
          </div>
          <div class="rounded-xl border border-slate-200 bg-white p-4">
            <div class="text-[.62rem] font-bold tracking-wider uppercase text-slate-500 mb-2">평균 통화</div>
            <div id="kpiAvgDuration" class="text-[1.4rem] font-black tnum tracking-tight text-slate-800">—</div>
          </div>
          <div class="rounded-xl border border-slate-200 bg-white p-4">
            <div class="text-[.62rem] font-bold tracking-wider uppercase text-slate-500 mb-2">진행 중</div>
            <div id="kpiActive" class="text-[1.4rem] font-black tnum tracking-tight text-slate-800">—</div>
          </div>
        </section>

        <!-- Status breakdown row -->
        <section id="statusBreakdown" class="grid grid-cols-2 lg:grid-cols-4 gap-3 lg:gap-4 hidden">
          <div class="rounded-xl border border-slate-200 bg-white p-3">
            <div class="text-[.62rem] font-bold tracking-wider uppercase text-slate-500">완료</div>
            <div id="breakEnded" class="text-[1.05rem] font-black tnum tracking-tight text-slate-800">—</div>
          </div>
          <div class="rounded-xl border border-slate-200 bg-white p-3">
            <div class="text-[.62rem] font-bold tracking-wider uppercase text-slate-500">미수신</div>
            <div id="breakMissed" class="text-[1.05rem] font-black tnum tracking-tight text-slate-800">—</div>
          </div>
          <div class="rounded-xl border border-slate-200 bg-white p-3">
            <div class="text-[.62rem] font-bold tracking-wider uppercase text-slate-500">끊김</div>
            <div id="breakDropped" class="text-[1.05rem] font-black tnum tracking-tight text-slate-800">—</div>
          </div>
          <div class="rounded-xl border border-slate-200 bg-white p-3">
            <div class="text-[.62rem] font-bold tracking-wider uppercase text-slate-500">진행 중</div>
            <div id="breakActive" class="text-[1.05rem] font-black tnum tracking-tight text-slate-800">—</div>
          </div>
        </section>

        <!-- Recent calls -->
        <section id="recentSection" class="rounded-2xl border border-slate-200 bg-white overflow-hidden hidden">
          <div class="px-5 py-4 border-b border-slate-200 flex items-center justify-between">
            <h3 class="text-[.95rem] font-black tracking-tight text-slate-800">최근 통화</h3>
            <a href="calls.html" class="text-[.78rem] font-bold text-blue-600 hover:underline">통화 기록 →</a>
          </div>
          <div class="overflow-x-auto">
            <table class="tbl">
              <thead>
                <tr>
                  <th>고객</th>
                  <th>담당</th>
                  <th class="hidden sm:table-cell">팀</th>
                  <th class="hidden md:table-cell">상태</th>
                  <th class="hidden md:table-cell">통화 시간</th>
                  <th>시각</th>
                </tr>
              </thead>
              <tbody id="recentBody"></tbody>
            </table>
          </div>
        </section>

      </main>
    </div>
  </div>

  <script src="api.js"></script>
  <script src="_shared.js"></script>
  <script>
    /* XSS gate — every API field flows through escapeHtml before innerHTML
       (AGENTS.md). textContent is used directly for plain labels. */
    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    const STATUS_BADGE = {
      in_progress: { c: 'badge-emerald', l: '진행 중' },
      ended:       { c: 'badge-blue',    l: '완료' },
      missed:      { c: 'badge-slate',   l: '미수신' },
      dropped:     { c: 'badge-rose',    l: '끊김' },
    };

    const SCOPE_BADGE_LABEL = {
      org: '조직 전체',
      team: '팀',
    };

    function formatDuration(secs) {
      if (secs === null || secs === undefined) return '—';
      const n = Math.max(0, Math.floor(secs));
      const m = Math.floor(n / 60);
      const s = n % 60;
      if (m === 0) return s + '초';
      return m + '분 ' + String(s).padStart(2, '0') + '초';
    }
    function formatResponseRate(rate) {
      if (rate === null || rate === undefined) return '—';
      return (rate * 100).toFixed(1) + '%';
    }
    function formatHHMM(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '';
      const Y = d.getFullYear();
      const M = String(d.getMonth() + 1).padStart(2, '0');
      const D = String(d.getDate()).padStart(2, '0');
      const h = String(d.getHours()).padStart(2, '0');
      const m = String(d.getMinutes()).padStart(2, '0');
      return Y + '-' + M + '-' + D + ' ' + h + ':' + m;
    }

    renderSidebar('reports');

    function showStatusBanner(kind, message) {
      const el = document.getElementById('statusBanner');
      const palette = {
        loading: 'border-slate-200 bg-slate-50 text-slate-600',
        forbidden: 'border-rose-200 bg-rose-50 text-rose-700',
        notfound: 'border-amber-200 bg-amber-50 text-amber-700',
        error: 'border-rose-200 bg-rose-50 text-rose-700',
      };
      el.className = 'rounded-xl border p-4 text-[.85rem] ' + (palette[kind] || palette.error);
      // textContent — never innerHTML for status messages.
      el.textContent = message;
      el.classList.remove('hidden');
      // Hide the report cards while a banner is showing.
      document.getElementById('headerCard').classList.add('hidden');
      document.getElementById('kpiSection').classList.add('hidden');
      document.getElementById('statusBreakdown').classList.add('hidden');
      document.getElementById('recentSection').classList.add('hidden');
    }

    function hideStatusBanner() {
      document.getElementById('statusBanner').classList.add('hidden');
    }

    function renderSummary(summary) {
      hideStatusBanner();
      document.getElementById('headerCard').classList.remove('hidden');
      document.getElementById('kpiSection').classList.remove('hidden');
      document.getElementById('statusBreakdown').classList.remove('hidden');
      document.getElementById('recentSection').classList.remove('hidden');

      // Scope label + title.
      const scopeLabel = SCOPE_BADGE_LABEL[summary.scope] || summary.scope || '—';
      const scopeBadge = document.getElementById('scopeBadge');
      // textContent for the badge — escapeHtml not needed for textContent.
      scopeBadge.textContent = scopeLabel;
      scopeBadge.classList.remove('hidden');

      const titleEl = document.getElementById('scopeTitle');
      const descEl = document.getElementById('scopeDesc');
      if (summary.scope === 'team') {
        // team_name is API-provided — textContent is XSS-safe.
        titleEl.textContent = (summary.team_name || '팀') + ' 팀 보고서';
        descEl.textContent =
          '해당 팀에 소속된 상담원의 통화만 집계됩니다.';
      } else {
        titleEl.textContent = '조직 전체 보고서';
        descEl.textContent =
          '조직 전체 통화를 집계합니다. 팀 미배정 통화도 포함됩니다.';
      }

      document.getElementById('generatedAtLabel').textContent =
        '생성: ' + formatHHMM(summary.generated_at);

      // KPI cards.
      document.getElementById('kpiTotal').textContent = String(summary.total_calls ?? 0);
      document.getElementById('kpiEnded').textContent = String(summary.ended_calls ?? 0);
      document.getElementById('kpiResponseRate').textContent = formatResponseRate(summary.response_rate);
      document.getElementById('kpiAvgDuration').textContent = formatDuration(summary.avg_duration_seconds);
      document.getElementById('kpiActive').textContent = String(summary.active_calls ?? 0);

      // Status breakdown.
      document.getElementById('breakEnded').textContent = String(summary.ended_calls ?? 0);
      document.getElementById('breakMissed').textContent = String(summary.missed_calls ?? 0);
      document.getElementById('breakDropped').textContent = String(summary.dropped_calls ?? 0);
      document.getElementById('breakActive').textContent = String(summary.active_calls ?? 0);

      // Recent calls.
      const body = document.getElementById('recentBody');
      const items = summary.recent_calls || [];
      if (items.length === 0) {
        body.innerHTML =
          '<tr><td colspan="6" class="text-center text-slate-400 py-8 text-[.8rem]">' +
          '최근 통화가 없습니다.</td></tr>';
        return;
      }
      body.innerHTML = items.map((c) => {
        const meta = STATUS_BADGE[c.status] || { c: 'badge-slate', l: c.status || '?' };
        const customerName = c.customer_name
          || (c.customer_id ? '고객 ' + c.customer_id.slice(0, 8) : '미등록 발신자');
        const agentName = c.agent_name || (c.agent_user_id ? '담당 ' + c.agent_user_id.slice(0, 8) : '미배정');
        const teamName = c.team_name || '팀 없음';
        return '<tr>' +
                 '<td>' +
                   '<div class="text-[.85rem] font-bold text-slate-800">' + escapeHtml(customerName) + '</div>' +
                   '<div class="text-[.72rem] text-slate-500">' + escapeHtml(c.title || '제목 없음') + '</div>' +
                 '</td>' +
                 '<td><span class="text-[.78rem] text-slate-700">' + escapeHtml(agentName) + '</span></td>' +
                 '<td class="hidden sm:table-cell"><span class="text-[.78rem] text-slate-600">' + escapeHtml(teamName) + '</span></td>' +
                 '<td class="hidden md:table-cell"><span class="badge ' + meta.c + '">' + escapeHtml(meta.l) + '</span></td>' +
                 '<td class="hidden md:table-cell"><span class="text-[.78rem] tnum text-slate-700">' +
                   escapeHtml(formatDuration(c.duration_seconds)) + '</span></td>' +
                 '<td><span class="text-[.78rem] tnum text-slate-500">' + escapeHtml(formatHHMM(c.started_at)) + '</span></td>' +
               '</tr>';
      }).join('');
    }

    async function loadReport() {
      showStatusBanner('loading', '보고서를 불러오는 중…');
      try {
        // Cold load: refresh access token first like the other authenticated
        // pages so the first call doesn't get a 401.
        if (window.kloserApi && typeof window.kloserApi.refreshAccessToken === 'function') {
          try { await window.kloserApi.refreshAccessToken(); } catch (_err) { /* api.js handles redirect */ }
        }
        const res = await window.kloserApi.getTeamReportSummary({});
        if (res.status === 403) {
          showStatusBanner('forbidden',
            '이 페이지는 관리자와 매니저만 볼 수 있습니다. 매니저의 경우 팀에 배정되어 있어야 합니다.');
          return;
        }
        if (res.status === 404) {
          showStatusBanner('notfound',
            '요청한 팀을 찾을 수 없습니다.');
          return;
        }
        if (!res.ok) {
          showStatusBanner('error', '보고서를 불러오지 못했습니다 (' + res.status + ').');
          return;
        }
        const body = await res.json();
        renderSummary(body);
      } catch (err) {
        console.warn('[reports] load failed', err);
        showStatusBanner('error', '네트워크 오류가 발생했습니다.');
      }
    }

    document.getElementById('reloadBtn').addEventListener('click', loadReport);

    loadReport();
  </script>
</body>
</html>
