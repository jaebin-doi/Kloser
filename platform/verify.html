<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <meta name="referrer" content="no-referrer" />
  <title>이메일 인증 — Kloser</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <script>
    tailwind.config = { theme: { extend: { fontFamily: {
      sans: ['Pretendard Variable', 'Pretendard', 'Inter', 'system-ui', 'sans-serif'] } } } };
  </script>
  <style>
    html, body {
      min-height: 100%;
      font-family: 'Pretendard Variable', 'Pretendard', 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; color: rgb(15 23 42);
    }
    body {
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(37, 99, 235, 0.08), transparent 60%),
        radial-gradient(900px 600px at -10% 110%, rgba(6, 182, 212, 0.08), transparent 60%),
        #f8fafc;
    }
    .g-text {
      background: linear-gradient(120deg, #2563eb 0%, #06b6d4 100%);
      -webkit-background-clip: text; background-clip: text; color: transparent;
    }
    .card { background: white; border: 1px solid rgb(226 232 240); border-radius: 16px;
            box-shadow: 0 1px 3px 0 rgba(15,23,42,0.04), 0 12px 32px -16px rgba(15,23,42,0.08); }
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 18px; border-radius: 10px;
      background: rgb(37 99 235); color: white; font-size: .85rem; font-weight: 700;
    }
    .btn-primary:hover { background: rgb(29 78 216); }
    .btn-secondary {
      display: inline-flex; align-items: center; justify-content: center;
      padding: 10px 18px; border-radius: 10px;
      background: white; color: rgb(71 85 105); border: 1px solid rgb(226 232 240);
      font-size: .85rem; font-weight: 600;
    }
    .btn-secondary:hover { background: rgb(248 250 252); }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>
  <main class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <div class="flex items-center justify-center gap-2 mb-6">
        <span class="text-[1.35rem] font-black tracking-tight"><span class="g-text">Kloser</span></span>
      </div>

      <div class="card p-8 text-center">
        <!-- pending -->
        <div id="state-pending">
          <svg class="spin mx-auto mb-4" width="44" height="44" fill="none" stroke="rgb(37 99 235)" stroke-width="2.5" viewBox="0 0 24 24">
            <path d="M21 12a9 9 0 1 1-3.5-7.1" stroke-linecap="round"/>
          </svg>
          <h1 class="text-[1.05rem] font-black tracking-tight">이메일 인증 처리 중…</h1>
        </div>

        <!-- success -->
        <div id="state-success" hidden>
          <div class="mx-auto w-14 h-14 rounded-full bg-emerald-100 flex items-center justify-center mb-4">
            <svg width="28" height="28" fill="none" stroke="rgb(16 185 129)" stroke-width="3" viewBox="0 0 24 24">
              <path d="M20 6 9 17l-5-5"/>
            </svg>
          </div>
          <h1 class="text-[1.15rem] font-black tracking-tight mb-2">이메일 인증이 완료되었습니다</h1>
          <p class="text-[.85rem] text-slate-500 mb-6">이제 모든 기능을 사용할 수 있어요.</p>
          <div class="flex gap-2 justify-center">
            <a id="success-primary" href="login.html" class="btn-primary">로그인하기</a>
          </div>
        </div>

        <!-- failure -->
        <div id="state-failure" hidden>
          <div class="mx-auto w-14 h-14 rounded-full bg-rose-100 flex items-center justify-center mb-4">
            <svg width="28" height="28" fill="none" stroke="rgb(225 29 72)" stroke-width="2.5" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
            </svg>
          </div>
          <h1 class="text-[1.15rem] font-black tracking-tight mb-2" id="failure-title">유효하지 않은 링크</h1>
          <p class="text-[.85rem] text-slate-500 mb-6" id="failure-desc">
            로그인 후 [인증 메일 재발송]을 눌러 새 메일을 요청하세요.
          </p>
          <div class="flex gap-2 justify-center">
            <a href="login.html" class="btn-primary">로그인하기</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="api.js"></script>
  <script>
    (function () {
      'use strict';

      // Read token immediately, then strip from history so raw token
      // does not leak via back-button, referer, or screenshots.
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      window.history.replaceState(null, '', window.location.pathname);

      const pendingEl = document.getElementById('state-pending');
      const successEl = document.getElementById('state-success');
      const failureEl = document.getElementById('state-failure');
      const failureTitle = document.getElementById('failure-title');
      const failureDesc = document.getElementById('failure-desc');

      function show(state) {
        pendingEl.hidden = state !== 'pending';
        successEl.hidden = state !== 'success';
        failureEl.hidden = state !== 'failure';
      }
      function fail(title, desc) {
        failureTitle.textContent = title;
        failureDesc.textContent = desc;
        show('failure');
      }

      if (!token) {
        fail('유효하지 않은 링크', '토큰이 없습니다. 새 인증 메일을 요청하세요.');
        return;
      }

      let inflight = false;
      (async function run() {
        if (inflight) return;
        inflight = true;
        try {
          const { status } = await window.kloserApi.verifyEmail(token);
          if (status === 200) {
            show('success');
          } else if (status === 410) {
            fail(
              '인증 링크가 더 이상 유효하지 않습니다',
              '링크가 만료되었거나 이미 사용되었습니다. 로그인 후 [인증 메일 재발송]을 눌러 새 메일을 요청하세요.',
            );
          } else if (status === 400) {
            fail('유효하지 않은 링크', '토큰 형식이 올바르지 않습니다.');
          } else {
            fail('일시적인 오류', '잠시 후 다시 시도해주세요.');
          }
        } catch (err) {
          console.error('[verify]', err);
          fail('네트워크 오류', '연결을 확인하고 다시 시도해주세요.');
        }
      })();
    })();
  </script>
</body>
</html>
