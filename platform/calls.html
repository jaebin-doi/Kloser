<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>통화 기록 — Kloser</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="_shared.css" />
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Pretendard Variable', 'Pretendard', 'Inter', 'system-ui', 'sans-serif'] } } } };
  </script>
  <style>
    body { overflow: hidden; }
    .filter-chip { padding: 6px 11px; border-radius: 7px; font-size: .76rem; font-weight: 600; color: rgb(71 85 105); border: 1px solid rgb(226 232 240); background: white; cursor: pointer; transition: all .15s; }
    .filter-chip.active { background: rgb(37 99 235); color: white; border-color: rgb(37 99 235); }
    .filter-chip:hover:not(.active) { background: rgb(248 250 252); }

    /* Detail panel slide */
    .detail-panel {
      transition: transform .25s cubic-bezier(0.16, 1, 0.3, 1), opacity .2s;
    }
    @media (max-width: 1023px) {
      .detail-panel {
        position: fixed; top: 0; right: 0; bottom: 0;
        width: 100%; max-width: 480px;
        z-index: 50; transform: translateX(100%);
        box-shadow: -24px 0 48px -12px rgba(15,23,42,.18);
      }
      .detail-panel.open { transform: translateX(0); }
    }
  </style>
</head>

<body class="bg-slate-50">

  <div class="flex h-screen">
    <div id="sidebarSlot"></div>

    <div class="flex-1 flex flex-col min-w-0">

      <!-- Topbar -->
      <header class="h-[60px] px-4 lg:px-6 flex items-center justify-between bg-white border-b border-slate-200 flex-shrink-0">
        <div class="flex items-center gap-3 min-w-0">
          <button onclick="toggleSidebar()" class="mobile-menu-btn w-9 h-9 rounded-lg hover:bg-slate-100 items-center justify-center text-slate-600" style="display:none">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="text-[1rem] font-black tracking-tight text-slate-800 truncate">통화 기록</h1>
          <span id="totalCount" class="text-[.7rem] text-slate-400 tnum hidden sm:inline">총 — 건</span>
        </div>
        <div class="flex items-center gap-2">
          <!-- CSV 내보내기는 Phase 6+ 작업 (settings에 표시되어 있고 미구현) — demo 라벨. -->
          <button class="btn-secondary hidden sm:inline-flex" title="CSV 내보내기 (Phase 6 예정)">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            CSV 내보내기
          </button>
          <a href="live.html" class="btn-primary">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            새 통화
          </a>
        </div>
      </header>

      <!-- Main split -->
      <main class="flex-1 grid lg:grid-cols-[1fr_420px] gap-0 overflow-hidden">

        <!-- List -->
        <section class="flex flex-col min-w-0 overflow-hidden lg:border-r border-slate-200">

          <!-- Filters -->
          <div class="px-4 lg:px-6 py-3 border-b border-slate-200 bg-white flex items-center gap-2 flex-wrap lg:justify-between flex-shrink-0">
            <div class="relative w-full lg:w-auto lg:max-w-xs">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" id="searchInput" placeholder="제목, 메모, 요약 검색"
                class="w-full pl-9 pr-3 py-2 rounded-lg border border-slate-200 bg-white text-[.82rem] outline-none focus:border-blue-400 focus:shadow-[0_0_0_4px_rgba(59,130,246,.12)] transition-all" />
            </div>
            <!-- Phase 4 backend filter set: q + status + customerId + agentUserId
                 + limit + offset. UI chips below map to status enum 또는 전체.
                 sort/dir은 백엔드 미지원이므로 제공하지 않음. -->
            <div class="flex items-center gap-1.5 flex-wrap">
              <button class="filter-chip active" data-status="">전체</button>
              <button class="filter-chip" data-status="in_progress">진행 중</button>
              <button class="filter-chip" data-status="ended">완료</button>
              <button class="filter-chip" data-status="missed">미수신</button>
              <button class="filter-chip" data-status="dropped">끊김</button>
            </div>
          </div>

          <!-- Table -->
          <div class="flex-1 overflow-y-auto scroll-area">
            <table class="tbl">
              <thead class="sticky top-0 z-10">
                <tr>
                  <th>상태</th>
                  <th>고객</th>
                  <th class="hidden sm:table-cell">유형</th>
                  <th class="hidden md:table-cell">길이</th>
                  <th>일시</th>
                  <th class="hidden lg:table-cell">요약</th>
                </tr>
              </thead>
              <tbody id="callsTable"></tbody>
            </table>
          </div>
        </section>

        <!-- Detail panel -->
        <aside id="detailPanel" class="detail-panel bg-white flex flex-col min-w-0 lg:w-[420px]">
          <!-- Default state -->
          <div id="detailEmpty" class="flex-1 flex flex-col items-center justify-center p-8 text-center">
            <div class="w-14 h-14 rounded-full bg-blue-50 flex items-center justify-center mb-4">
              <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" class="text-blue-600" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            </div>
            <h3 class="text-[.95rem] font-bold text-slate-800 mb-1">통화를 선택하세요</h3>
            <p class="text-[.78rem] text-slate-500">왼쪽 목록에서 통화를 클릭하면<br>요약·Transcript·다음 액션이 표시됩니다.</p>
          </div>

          <!-- Detail content (hidden by default) -->
          <div id="detailContent" class="hidden flex-1 flex flex-col min-h-0">
            <!-- Header -->
            <div class="px-5 py-4 border-b border-slate-200 flex items-start justify-between gap-3">
              <div class="min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <span id="dCallId" class="text-[.78rem] font-bold text-slate-800"></span>
                  <span id="dStatus" class="badge"></span>
                </div>
                <div class="flex items-center gap-2 text-[.7rem] text-slate-500">
                  <span id="dDate"></span> · <span id="dDuration"></span>
                </div>
              </div>
              <button onclick="closeDetail()" class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-500 transition-colors">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg>
              </button>
            </div>

            <!-- Customer -->
            <div class="px-5 py-4 border-b border-slate-200 flex items-center gap-3">
              <div id="dAvatar" class="w-11 h-11 rounded-full bg-gradient-to-br from-violet-500 to-blue-500 flex items-center justify-center text-white font-black"></div>
              <div class="min-w-0 flex-1">
                <div id="dCustomer" class="font-bold text-slate-800 truncate"></div>
                <div id="dCompany" class="text-[.75rem] text-slate-500 truncate"></div>
              </div>
              <button class="btn-secondary text-[.72rem]">고객 보기</button>
            </div>

            <!-- Tabs + content -->
            <div class="flex-1 overflow-y-auto scroll-area">
              <div class="px-5 py-4 space-y-4">

                <!-- Summary -->
                <section>
                  <div class="text-[.62rem] font-black uppercase tracking-wider text-slate-400 mb-2">통화 요약</div>
                  <div class="space-y-2">
                    <div class="rounded-lg border border-slate-200 bg-slate-50/50 p-3">
                      <div class="text-[.7rem] font-bold text-slate-600 mb-1">고객 니즈</div>
                      <p id="dNeeds" class="text-[.8rem] text-slate-700 leading-relaxed"></p>
                    </div>
                    <div class="rounded-lg border border-amber-200 bg-amber-50/50 p-3">
                      <div class="text-[.7rem] font-bold text-amber-700 mb-1">미해결 이슈</div>
                      <p id="dIssues" class="text-[.8rem] text-slate-700 leading-relaxed"></p>
                    </div>
                    <div class="rounded-lg border border-emerald-200 bg-emerald-50/50 p-3">
                      <div class="text-[.7rem] font-bold text-emerald-700 mb-1">메모</div>
                      <p id="dNotes" class="text-[.8rem] text-slate-700 leading-relaxed whitespace-pre-wrap"></p>
                    </div>
                    <div class="rounded-lg border border-blue-200 bg-blue-50/40 p-3">
                      <div class="flex items-center justify-between mb-1.5">
                        <div class="text-[.7rem] font-bold text-blue-700">다음 액션</div>
                        <span id="dSummarySource" class="text-[.62rem] font-bold px-1.5 py-0.5 rounded bg-slate-100 text-slate-600"></span>
                      </div>
                      <ul id="dActions" class="space-y-1 text-[.78rem] text-slate-700"></ul>
                      <!-- Action item create form — Phase 5 Step 4.
                           No delete endpoint, so no delete control. -->
                      <div class="mt-2 pt-2 border-t border-blue-100 flex items-center gap-2">
                        <input id="dActionInput" type="text" placeholder="새 액션 항목" maxlength="200"
                          class="flex-1 px-2 py-1.5 text-[.78rem] border border-slate-200 rounded-md bg-white focus:outline-none focus:border-blue-400" />
                        <button id="dActionAddBtn" type="button" class="text-[.72rem] font-bold text-blue-700 hover:text-blue-800 px-2 py-1 rounded-md hover:bg-blue-100">추가</button>
                      </div>
                      <div id="dActionStatus" class="text-[.65rem] text-slate-500 mt-1"></div>
                    </div>
                  </div>
                </section>

                <!-- Manual summary writer — Phase 5 Step 4.
                     Server keeps AI vs manual split via summary_source.
                     Saving here marks summary_source='manual' which
                     blocks subsequent AI overwrites (callSummary service). -->
                <section>
                  <div class="text-[.62rem] font-black uppercase tracking-wider text-slate-400 mb-2">수동 요약 편집</div>
                  <div class="rounded-lg border border-slate-200 bg-white p-3 space-y-2">
                    <div>
                      <label class="text-[.65rem] font-bold text-slate-500">요약</label>
                      <textarea id="dManualSummary" rows="2" maxlength="4000" class="w-full mt-1 px-2 py-1.5 text-[.78rem] border border-slate-200 rounded-md focus:outline-none focus:border-blue-400 resize-none" placeholder="통화 요약을 직접 입력하세요."></textarea>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                      <div>
                        <label class="text-[.65rem] font-bold text-slate-500">고객 니즈</label>
                        <textarea id="dManualNeeds" rows="2" maxlength="4000" class="w-full mt-1 px-2 py-1.5 text-[.78rem] border border-slate-200 rounded-md focus:outline-none focus:border-blue-400 resize-none"></textarea>
                      </div>
                      <div>
                        <label class="text-[.65rem] font-bold text-slate-500">미해결 이슈</label>
                        <textarea id="dManualIssues" rows="2" maxlength="4000" class="w-full mt-1 px-2 py-1.5 text-[.78rem] border border-slate-200 rounded-md focus:outline-none focus:border-blue-400 resize-none"></textarea>
                      </div>
                    </div>
                    <div class="flex items-center gap-2">
                      <label class="text-[.65rem] font-bold text-slate-500">감정</label>
                      <select id="dManualSentiment" class="px-2 py-1 text-[.78rem] border border-slate-200 rounded-md bg-white focus:outline-none focus:border-blue-400">
                        <option value="">선택 안 함</option>
                        <option value="positive">긍정</option>
                        <option value="neutral">보통</option>
                        <option value="cautious">망설임</option>
                        <option value="negative">부정</option>
                      </select>
                      <button id="dManualSaveBtn" type="button" class="ml-auto btn-primary text-[.72rem]">수동 요약 저장</button>
                    </div>
                    <div id="dManualStatus" class="text-[.65rem] text-slate-500"></div>
                  </div>
                </section>

                <!-- Suggestion history — Phase 5 Step 4.
                     Lists AI suggestion cards persisted during the call
                     (call_suggestions). Title/body are server/LLM-returned
                     strings and go through escapeHtml. -->
                <section>
                  <div class="text-[.62rem] font-black uppercase tracking-wider text-slate-400 mb-2">AI 추천 이력</div>
                  <div id="dSuggestions" class="space-y-2"></div>
                </section>

                <!-- Transcript -->
                <section>
                  <div class="text-[.62rem] font-black uppercase tracking-wider text-slate-400 mb-2">전체 Transcript</div>
                  <div id="dTranscript" class="rounded-lg border border-slate-200 bg-white p-3 space-y-2.5"></div>
                </section>

                <!-- Tags -->
                <section>
                  <div class="text-[.62rem] font-black uppercase tracking-wider text-slate-400 mb-2">자동 태그</div>
                  <div id="dTags" class="flex flex-wrap gap-1.5"></div>
                </section>

              </div>
            </div>

            <!-- Footer actions -->
            <div class="px-5 py-3 border-t border-slate-200 flex gap-2 flex-shrink-0">
              <button class="btn-secondary flex-1 justify-center">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                메모 추가
              </button>
              <button class="btn-primary flex-1 justify-center">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M22 2 11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                메일 발송
              </button>
            </div>
          </div>
        </aside>
      </main>

    </div>
  </div>

  <script src="api.js"></script>
  <script src="_shared.js"></script>
  <script>
    /* Phase 4 Step 4 — Mock 통화 array는 제거됨. /calls API로 list/detail 렌더. */

    /* XSS gate: server-supplied 필드를 innerHTML 보간하는 모든 자리에 적용.
       customers.html / team.html과 동일 헬퍼를 복제. */
    function escapeHtml(str) {
      if (str === null || str === undefined) return '';
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    const STATUS_BADGE = {
      in_progress: { c: 'badge-emerald', l: '진행 중', live: true },
      ended:       { c: 'badge-blue',    l: '완료' },
      missed:      { c: 'badge-slate',   l: '미수신' },
      dropped:     { c: 'badge-rose',    l: '끊김' },
    };
    const DIRECTION_LABEL = {
      inbound:  '인바운드',
      outbound: '아웃바운드',
      meeting:  '미팅',
    };
    const SENTIMENT_LABEL = {
      positive: '긍정',
      neutral:  '보통',
      cautious: '망설임',
      negative: '부정',
    };

    function avatarColorFor(name) {
      const palette = ['bg-violet-500','bg-rose-500','bg-emerald-500','bg-amber-500','bg-blue-500','bg-cyan-500','bg-pink-500','bg-teal-500'];
      const safe = (name && name.length > 0) ? name : '?';
      const idx = (safe.charCodeAt(0) + safe.charCodeAt(safe.length-1)) % palette.length;
      return palette[idx];
    }

    function formatDuration(secs) {
      if (secs === null || secs === undefined) return '—';
      const n = Math.max(0, Math.floor(secs));
      const m = Math.floor(n / 60);
      const s = n % 60;
      if (m === 0) return s + '초';
      return m + '분 ' + String(s).padStart(2, '0') + '초';
    }

    function formatDateShort(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '';
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mi = String(d.getMinutes()).padStart(2, '0');
      return mm + '-' + dd + ' · ' + hh + ':' + mi;
    }

    function formatDateLong(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '';
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mi = String(d.getMinutes()).padStart(2, '0');
      return yyyy + '-' + mm + '-' + dd + ' ' + hh + ':' + mi;
    }

    /* URL state — q / status / customerId / agentUserId / limit / offset.
       sort/dir은 백엔드 미지원이므로 URL에 넣지 않는다. */
    function readUrlState() {
      const sp = new URLSearchParams(window.location.search);
      return {
        q:           sp.get('q')           || '',
        status:      sp.get('status')      || '',
        customerId:  sp.get('customerId')  || '',
        agentUserId: sp.get('agentUserId') || '',
        limit:       Number(sp.get('limit'))  || 20,
        offset:      Number(sp.get('offset')) || 0,
      };
    }
    function writeUrlState(state) {
      const sp = new URLSearchParams();
      if (state.q)           sp.set('q', state.q);
      if (state.status)      sp.set('status', state.status);
      if (state.customerId)  sp.set('customerId', state.customerId);
      if (state.agentUserId) sp.set('agentUserId', state.agentUserId);
      if (state.limit  && state.limit  !== 20) sp.set('limit',  String(state.limit));
      if (state.offset && state.offset !== 0)  sp.set('offset', String(state.offset));
      const qs = sp.toString();
      const url = window.location.pathname + (qs ? '?' + qs : '');
      window.history.replaceState(null, '', url);
    }

    let state = readUrlState();
    const tableEl = document.getElementById('callsTable');
    const totalCountEl = document.getElementById('totalCount');

    function renderTable(body) {
      tableEl.innerHTML = '';
      const items = (body && body.items) || [];
      const total = (body && typeof body.total === 'number') ? body.total : items.length;
      totalCountEl.textContent = '총 ' + total.toLocaleString() + ' 건';

      if (items.length === 0) {
        const tr = document.createElement('tr');
        const td = document.createElement('td');
        td.colSpan = 6;
        td.className = 'text-center text-slate-400 py-12 text-[.85rem]';
        td.textContent = state.q ? '검색 결과가 없습니다.' : '아직 통화 기록이 없습니다.';
        tr.appendChild(td);
        tableEl.appendChild(tr);
        return;
      }

      items.forEach((c) => {
        const tr = document.createElement('tr');
        tr.classList.add('cursor-pointer');
        tr.addEventListener('click', () => openDetail(c.id));

        const meta = STATUS_BADGE[c.status] || { c: 'badge-slate', l: c.status || '?' };
        const live = meta.live
          ? '<span class="pulse-dot mr-1" style="width:6px;height:6px"></span>'
          : '';
        const titleFallback = c.title || (DIRECTION_LABEL[c.direction] || c.direction || '통화');
        const initial = (titleFallback.charAt(0) || '·').toUpperCase();
        const avatarClass = avatarColorFor(titleFallback);

        // Build innerHTML with all server fields escaped.
        tr.innerHTML =
          '<td><span class="badge ' + meta.c + '">' + live + escapeHtml(meta.l) + '</span></td>' +
          '<td>' +
            '<div class="flex items-center gap-2.5 min-w-0">' +
              '<div class="w-8 h-8 rounded-full ' + avatarClass +
                ' flex items-center justify-center text-[.7rem] font-black text-white shrink-0">' +
                escapeHtml(initial) + '</div>' +
              '<div class="min-w-0">' +
                '<div class="font-bold text-slate-800 text-[.85rem] truncate">' +
                  escapeHtml(titleFallback) + '</div>' +
                '<div class="text-[.68rem] text-slate-400 truncate">' +
                  escapeHtml(c.customer_id ? '고객 ID ' + c.customer_id.slice(0, 8) : '미등록 발신자') + '</div>' +
              '</div>' +
            '</div>' +
          '</td>' +
          '<td class="hidden sm:table-cell text-slate-600 text-[.78rem]">' +
            escapeHtml(DIRECTION_LABEL[c.direction] || c.direction || '') + '</td>' +
          '<td class="hidden md:table-cell text-slate-700 tnum text-[.78rem]">' +
            escapeHtml(formatDuration(c.duration_seconds)) + '</td>' +
          '<td class="text-slate-600 text-[.78rem] tnum">' +
            escapeHtml(formatDateShort(c.started_at)) + '</td>' +
          '<td class="hidden lg:table-cell text-slate-600 text-[.78rem] max-w-[260px] truncate">' +
            escapeHtml(c.summary || c.notes || '') + '</td>';

        tableEl.appendChild(tr);
      });
    }

    async function fetchList() {
      const query = {
        limit:  state.limit,
        offset: state.offset,
      };
      if (state.q)           query.q = state.q;
      if (state.status)      query.status = state.status;
      if (state.customerId)  query.customerId = state.customerId;
      if (state.agentUserId) query.agentUserId = state.agentUserId;

      const res = await window.kloserApi.listCalls(query);
      if (res.status === 401) return; // authFetch will have redirected.
      if (!res.ok) {
        console.error('[calls] list failed', res.status);
        tableEl.innerHTML =
          '<tr><td colspan="6" class="text-center text-rose-500 py-12 text-[.85rem]">' +
          '목록을 불러오지 못했습니다.</td></tr>';
        return;
      }
      const body = await res.json();
      renderTable(body);
    }

    // Filter chips → status state.
    document.querySelectorAll('.filter-chip').forEach((btn) => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
        state.status = btn.dataset.status || '';
        state.offset = 0;
        writeUrlState(state);
        fetchList();
      });
    });

    // Search — debounce 250ms.
    let searchTimer = null;
    document.getElementById('searchInput').addEventListener('input', (e) => {
      if (searchTimer) clearTimeout(searchTimer);
      searchTimer = setTimeout(() => {
        state.q = e.target.value;
        state.offset = 0;
        writeUrlState(state);
        fetchList();
      }, 250);
    });

    // Restore search input + active chip from URL on first paint.
    (function applyUrlToControls() {
      document.getElementById('searchInput').value = state.q;
      document.querySelectorAll('.filter-chip').forEach((b) => {
        b.classList.toggle('active', (b.dataset.status || '') === state.status);
      });
    })();

    /* ─── Detail panel ─── */

    async function openDetail(callId) {
      // Optimistic UI flip — show panel + reset placeholders before fetch.
      document.getElementById('detailEmpty').classList.add('hidden');
      const dc = document.getElementById('detailContent');
      dc.classList.remove('hidden');
      dc.classList.add('flex');
      document.getElementById('detailPanel').classList.add('open');

      document.getElementById('dCallId').textContent = '로딩 중…';
      const ds = document.getElementById('dStatus');
      ds.className = 'badge badge-slate';
      ds.textContent = '';
      document.getElementById('dDate').textContent = '';
      document.getElementById('dDuration').textContent = '';
      document.getElementById('dAvatar').textContent = '·';
      document.getElementById('dAvatar').className =
        'w-11 h-11 rounded-full bg-slate-300 flex items-center justify-center text-white font-black';
      document.getElementById('dCustomer').textContent = '';
      document.getElementById('dCompany').textContent = '';
      document.getElementById('dNeeds').textContent = '';
      document.getElementById('dIssues').textContent = '';
      document.getElementById('dNotes').textContent = '';
      document.getElementById('dActions').innerHTML = '';
      document.getElementById('dTranscript').innerHTML = '';
      document.getElementById('dTags').innerHTML = '';

      // Reset Phase 5 controls
      document.getElementById('dSummarySource').textContent = '';
      document.getElementById('dManualSummary').value = '';
      document.getElementById('dManualNeeds').value = '';
      document.getElementById('dManualIssues').value = '';
      document.getElementById('dManualSentiment').value = '';
      document.getElementById('dManualStatus').textContent = '';
      document.getElementById('dActionInput').value = '';
      document.getElementById('dActionStatus').textContent = '';
      document.getElementById('dSuggestions').innerHTML = '';

      currentCallId = callId;

      // Parallel fetch — single transaction per request but separate
      // HTTP roundtrips so they overlap. 404 on the call itself short-
      // circuits; transcript/action 404 just means the parent call
      // disappeared between calls (race) and we treat them as empty.
      let callRes, trRes, aiRes, sgRes;
      try {
        [callRes, trRes, aiRes, sgRes] = await Promise.all([
          window.kloserApi.getCall(callId),
          window.kloserApi.listTranscript(callId),
          window.kloserApi.listActionItems(callId),
          window.kloserApi.listCallSuggestions(callId),
        ]);
      } catch (err) {
        console.error('[calls] detail fetch failed', err);
        document.getElementById('dCallId').textContent = '로드 실패';
        return;
      }

      if (callRes.status === 404) {
        document.getElementById('dCallId').textContent = '찾을 수 없음';
        return;
      }
      if (!callRes.ok) {
        document.getElementById('dCallId').textContent = '로드 실패';
        return;
      }
      const { call } = await callRes.json();
      const transcripts = trRes.ok ? (await trRes.json()).items || [] : [];
      const actionItems = aiRes.ok ? (await aiRes.json()).items || [] : [];
      const suggestions = sgRes && sgRes.ok ? (await sgRes.json()).items || [] : [];

      const meta = STATUS_BADGE[call.status] || { c: 'badge-slate', l: call.status };
      ds.className = 'badge ' + meta.c;
      ds.textContent = meta.l;

      document.getElementById('dCallId').textContent = '#' + call.id.slice(0, 8);
      document.getElementById('dDate').textContent = formatDateLong(call.started_at);
      document.getElementById('dDuration').textContent =
        '통화 ' + formatDuration(call.duration_seconds);

      const titleFallback = call.title || (DIRECTION_LABEL[call.direction] || call.direction || '통화');
      const ava = document.getElementById('dAvatar');
      ava.className =
        'w-11 h-11 rounded-full ' + avatarColorFor(titleFallback) +
        ' flex items-center justify-center text-white font-black';
      ava.textContent = (titleFallback.charAt(0) || '·').toUpperCase();

      document.getElementById('dCustomer').textContent =
        call.customer_id ? '고객 ID ' + call.customer_id.slice(0, 8) : '미등록 발신자';
      const dirLabel = DIRECTION_LABEL[call.direction] || call.direction || '';
      document.getElementById('dCompany').textContent =
        (call.title || '제목 없음') + (dirLabel ? ' · ' + dirLabel : '');

      document.getElementById('dNeeds').textContent  = call.needs   || '아직 분석되지 않았습니다.';
      document.getElementById('dIssues').textContent = call.issues  || '미해결 이슈가 등록되지 않았습니다.';
      document.getElementById('dNotes').textContent  = call.notes   || '메모가 없습니다.';

      // Action items — Phase 5 Step 4: status toggle. Phase 6 Step 3
      // adds the row-level delete control (hard delete, 204 → reload
      // detail). Title/due_date/id are server-returned strings →
      // every interpolation flows through escapeHtml before innerHTML.
      renderActionItems(actionItems);

      // Summary source badge (manual vs ai) — Phase 5 Step 4.
      const srcBadge = document.getElementById('dSummarySource');
      if (call.summary_source === 'manual') {
        srcBadge.textContent = '수동 작성';
        srcBadge.className = 'text-[.62rem] font-bold px-1.5 py-0.5 rounded bg-emerald-50 text-emerald-700';
      } else if (call.summary_source === 'ai') {
        srcBadge.textContent = 'AI 생성';
        srcBadge.className = 'text-[.62rem] font-bold px-1.5 py-0.5 rounded bg-blue-50 text-blue-700';
      } else {
        srcBadge.textContent = '미작성';
        srcBadge.className = 'text-[.62rem] font-bold px-1.5 py-0.5 rounded bg-slate-100 text-slate-500';
      }

      // Pre-fill the manual summary form with the current call values
      // so the writer is an edit-in-place experience.
      document.getElementById('dManualSummary').value = call.summary || '';
      document.getElementById('dManualNeeds').value   = call.needs   || '';
      document.getElementById('dManualIssues').value  = call.issues  || '';
      document.getElementById('dManualSentiment').value = call.sentiment || '';

      // Render suggestion history.
      renderSuggestionHistory(suggestions);

      // Transcript — speaker label maps agent/customer/system.
      const tr = document.getElementById('dTranscript');
      if (transcripts.length === 0) {
        tr.innerHTML =
          '<div class="text-center py-3 text-slate-400 text-[.75rem]">Transcript 없음</div>';
      } else {
        tr.innerHTML = transcripts.map((t) => {
          const label = t.speaker === 'agent' ? '상담원'
                       : t.speaker === 'system' ? '안내'
                                                : '고객';
          const labelClass = t.speaker === 'agent'
            ? 'bg-blue-100 text-blue-700'
            : t.speaker === 'system'
              ? 'bg-amber-100 text-amber-700'
              : 'bg-slate-100 text-slate-500';
          return '<div class="flex gap-1.5">' +
                   '<span class="text-[.55rem] px-1 rounded ' + labelClass +
                     ' shrink-0 self-start mt-0.5 font-bold">' + escapeHtml(label) + '</span>' +
                   '<p class="text-[.78rem] text-slate-700 leading-snug">' + escapeHtml(t.text) + '</p>' +
                 '</div>';
        }).join('');
      }

      // Tags — Phase 4 시점에는 sentiment만 빠른 라벨로 보여줌.
      const dTags = document.getElementById('dTags');
      const tagsParts = [];
      if (call.sentiment) {
        tagsParts.push('<span class="badge badge-slate">' +
          escapeHtml(SENTIMENT_LABEL[call.sentiment] || call.sentiment) + '</span>');
      }
      if (call.direction) {
        tagsParts.push('<span class="badge badge-slate">' +
          escapeHtml(DIRECTION_LABEL[call.direction] || call.direction) + '</span>');
      }
      dTags.innerHTML = tagsParts.join('') ||
        '<span class="text-slate-400 text-[.72rem]">태그가 없습니다.</span>';
    }

    // ─────────────────────────────────────────────
    // Phase 5 Step 4 — detail panel mutation handlers.
    // currentCallId is the id of the call whose detail is open. Set
    // inside openDetail; closeDetail clears it.
    // ─────────────────────────────────────────────
    let currentCallId = null;

    function renderActionItems(items) {
      const ul = document.getElementById('dActions');
      if (!items || items.length === 0) {
        ul.innerHTML = '<li class="text-slate-400 text-[.78rem]">등록된 다음 액션이 없습니다.</li>';
        return;
      }
      ul.innerHTML = items.map((a) => {
        const isDone = a.status === 'done';
        const due = a.due_date ? ' (' + escapeHtml(a.due_date) + ')' : '';
        // data-action-id + data-action-status drive the click handler below.
        // The trailing ✕ button is Phase 6 Step 3 — hard delete.
        return '<li class="flex items-start gap-1.5 ' + (isDone ? 'text-slate-400 line-through' : '') + '">' +
                 '<button type="button" data-action-id="' + escapeHtml(a.id) + '" data-action-status="' + escapeHtml(a.status) + '"' +
                 ' class="text-blue-500 font-black shrink-0 hover:text-blue-700" title="상태 토글">' +
                 (isDone ? '✓' : '→') +
                 '</button>' +
                 '<span class="flex-1">' + escapeHtml(a.title || '') + due + '</span>' +
                 '<button type="button" data-delete-action-id="' + escapeHtml(a.id) + '"' +
                 ' class="text-slate-300 hover:text-rose-600 shrink-0 text-[.85rem] leading-none px-1"' +
                 ' aria-label="삭제" title="삭제">✕</button>' +
               '</li>';
      }).join('');

      ul.querySelectorAll('button[data-action-id]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-action-id');
          const cur = btn.getAttribute('data-action-status');
          const next = cur === 'done' ? 'open' : 'done';
          btn.disabled = true;
          try {
            const res = await window.kloserApi.patchActionItemStatus(id, next);
            if (res.ok && currentCallId) {
              // refresh the detail panel so the strike-through state
              // matches what the server stored.
              await openDetail(currentCallId);
            } else {
              document.getElementById('dActionStatus').textContent = '상태 변경 실패 (' + res.status + ')';
              btn.disabled = false;
            }
          } catch (err) {
            console.warn('[calls] action status failed', err);
            document.getElementById('dActionStatus').textContent = '네트워크 오류';
            btn.disabled = false;
          }
        });
      });

      // Phase 6 Step 3 — hard delete handler. No confirmation modal
      // (consistent with other mutation controls on this page); on
      // success / 404 we reload the detail panel so the row reflects
      // server state. 403 surfaces "권한 없음".
      ul.querySelectorAll('button[data-delete-action-id]').forEach((btn) => {
        btn.addEventListener('click', async () => {
          const id = btn.getAttribute('data-delete-action-id');
          btn.disabled = true;
          try {
            const res = await window.kloserApi.deleteActionItem(id);
            if (res.status === 204 || res.status === 404) {
              // 204: gone. 404: someone else already removed it. Either
              // way the right next state is "reload list from server".
              if (currentCallId) await openDetail(currentCallId);
            } else if (res.status === 403) {
              document.getElementById('dActionStatus').textContent = '권한 없음';
              btn.disabled = false;
            } else {
              document.getElementById('dActionStatus').textContent = '삭제 실패 (' + res.status + ')';
              btn.disabled = false;
            }
          } catch (err) {
            console.warn('[calls] action delete failed', err);
            document.getElementById('dActionStatus').textContent = '네트워크 오류';
            btn.disabled = false;
          }
        });
      });
    }

    function renderSuggestionHistory(items) {
      const el = document.getElementById('dSuggestions');
      if (!items || items.length === 0) {
        el.innerHTML = '<div class="text-slate-400 text-[.75rem]">기록된 AI 추천이 없습니다.</div>';
        return;
      }
      const SUG_TYPE_LABEL = {
        direction: '방향', script: '스크립트', alert: '주의',
        risk: '리스크', next: '다음', kb: '가이드',
      };
      const SUG_TONE_BADGE = {
        blue:    'bg-blue-50 text-blue-700',
        cyan:    'bg-cyan-50 text-cyan-700',
        amber:   'bg-amber-50 text-amber-700',
        rose:    'bg-rose-50 text-rose-700',
        emerald: 'bg-emerald-50 text-emerald-700',
        slate:   'bg-slate-100 text-slate-600',
      };
      el.innerHTML = items.map((s) => {
        const typeLabel = SUG_TYPE_LABEL[s.type] || s.type || '';
        const toneBadge = SUG_TONE_BADGE[s.tone] || 'bg-slate-100 text-slate-600';
        let stateBadge = '';
        if (s.used_at) {
          stateBadge = '<span class="text-[.6rem] font-bold px-1.5 py-0.5 rounded bg-emerald-50 text-emerald-700">사용됨</span>';
        } else if (s.dismissed_at) {
          stateBadge = '<span class="text-[.6rem] font-bold px-1.5 py-0.5 rounded bg-slate-100 text-slate-500">닫음</span>';
        } else {
          stateBadge = '<span class="text-[.6rem] font-bold px-1.5 py-0.5 rounded bg-amber-50 text-amber-700">미반응</span>';
        }
        return '<div class="rounded-lg border border-slate-200 bg-white p-2.5">' +
                 '<div class="flex items-center justify-between gap-2 mb-1">' +
                   '<span class="text-[.62rem] font-bold uppercase tracking-wider px-1.5 py-0.5 rounded ' + toneBadge + '">' +
                     escapeHtml(typeLabel) +
                   '</span>' +
                   stateBadge +
                 '</div>' +
                 '<div class="text-[.78rem] font-bold text-slate-800">' + escapeHtml(s.title || '') + '</div>' +
                 (s.body ? '<div class="text-[.74rem] text-slate-600 mt-0.5 whitespace-pre-wrap">' + escapeHtml(s.body) + '</div>' : '') +
               '</div>';
      }).join('');
    }

    // Manual summary save — sets summary_source='manual'. Empty
    // strings are coerced to null on the wire so the server clears
    // the field rather than storing '' (Phase 5 routes treat null
    // and empty as clear).
    function emptyToNull(v) {
      const s = (v == null ? '' : String(v)).trim();
      return s.length === 0 ? null : s;
    }

    async function saveManualSummary() {
      if (!currentCallId) return;
      const statusEl = document.getElementById('dManualStatus');
      statusEl.textContent = '저장 중…';
      const payload = {
        summary: emptyToNull(document.getElementById('dManualSummary').value),
        needs:   emptyToNull(document.getElementById('dManualNeeds').value),
        issues:  emptyToNull(document.getElementById('dManualIssues').value),
        sentiment: emptyToNull(document.getElementById('dManualSentiment').value),
      };
      try {
        const res = await window.kloserApi.patchCallManualSummary(currentCallId, payload);
        if (res.ok) {
          statusEl.textContent = '저장됨';
          setTimeout(() => { statusEl.textContent = ''; }, 1800);
          await openDetail(currentCallId);
        } else if (res.status === 403) {
          statusEl.textContent = '권한 없음';
        } else if (res.status === 404) {
          statusEl.textContent = '통화를 찾을 수 없습니다';
        } else if (res.status === 400) {
          statusEl.textContent = '입력값을 확인해주세요';
        } else {
          statusEl.textContent = '저장 실패 (' + res.status + ')';
        }
      } catch (err) {
        console.warn('[calls] manual summary failed', err);
        statusEl.textContent = '네트워크 오류';
      }
    }

    async function addActionItem() {
      if (!currentCallId) return;
      const input = document.getElementById('dActionInput');
      const title = (input.value || '').trim();
      const statusEl = document.getElementById('dActionStatus');
      if (!title) { statusEl.textContent = '제목을 입력하세요.'; return; }
      statusEl.textContent = '추가 중…';
      try {
        const res = await window.kloserApi.createActionItem(currentCallId, { title: title });
        if (res.status === 201 || res.ok) {
          input.value = '';
          statusEl.textContent = '';
          await openDetail(currentCallId);
        } else if (res.status === 403) {
          statusEl.textContent = '권한 없음';
        } else {
          statusEl.textContent = '추가 실패 (' + res.status + ')';
        }
      } catch (err) {
        console.warn('[calls] action item create failed', err);
        statusEl.textContent = '네트워크 오류';
      }
    }

    function closeDetail() {
      document.getElementById('detailContent').classList.add('hidden');
      document.getElementById('detailContent').classList.remove('flex');
      document.getElementById('detailEmpty').classList.remove('hidden');
      document.getElementById('detailPanel').classList.remove('open');
      currentCallId = null;
    }
    window.closeDetail = closeDetail;

    // Wire Phase 5 controls once at load time. They read currentCallId
    // when invoked, so they only act after a detail panel is open.
    document.getElementById('dManualSaveBtn').addEventListener('click', saveManualSummary);
    document.getElementById('dActionAddBtn').addEventListener('click', addActionItem);
    document.getElementById('dActionInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); addActionItem(); }
    });

    /* ─── Boot ─── */
    (async () => {
      if (!window.kloserApi) return;
      // Auth gate identical to live.html.
      if (!window.kloserApi.getAccessToken()) {
        try { await window.kloserApi.refreshAccessToken(); }
        catch (_err) { window.kloserApi.loginRedirect(); return; }
      }

      renderSidebar('calls');

      try {
        const meRes = await window.kloserApi.apiGet('/me');
        if (meRes.ok && typeof window.renderUnverifiedBanner === 'function') {
          const me = await meRes.json();
          window.renderUnverifiedBanner(me.user);
        }
      } catch (err) {
        console.warn('[calls] /me failed', err);
      }

      await fetchList();
    })().catch((err) => console.error('[calls] boot failed', err));
  </script>
</body>
</html>
