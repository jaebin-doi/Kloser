<!DOCTYPE html>
<html lang="ko">

  <title>통화 기록 — Kloser</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <link rel="stylesheet" href="_shared.css" />
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Pretendard Variable', 'Pretendard', 'Inter', 'system-ui', 'sans-serif'] } } } };

  <style>
    body { overflow: hidden; }
    .filter-chip { padding: 6px 11px; border-radius: 7px; font-size: .76rem; font-weight: 600; color: rgb(71 85 105); border: 1px solid rgb(226 232 240); background: white; cursor: pointer; transition: all .15s; }
    .filter-chip.active { background: rgb(37 99 235); color: white; border-color: rgb(37 99 235); }
    .filter-chip:hover:not(.active) { background: rgb(248 250 252); }

    /* Detail panel slide */
    .detail-panel {
      transition: transform .25s cubic-bezier(0.16, 1, 0.3, 1), opacity .2s;
    }
    @media (max-width: 1023px) {
      .detail-panel {
        position: fixed; top: 0; right: 0; bottom: 0;
        width: 100%; max-width: 480px;
        z-index: 50; transform: translateX(100%);
        box-shadow: -24px 0 48px -12px rgba(15,23,42,.18);
      }
      .detail-panel.open { transform: translateX(0); }
    }
  </style>
</head>

<body class="bg-slate-50">

  <div class="flex h-screen">
    <div id="sidebarSlot"></div>

    <div class="flex-1 flex flex-col min-w-0">

      <!-- Topbar -->
      <header class="h-[60px] px-4 lg:px-6 flex items-center justify-between bg-white border-b border-slate-200 flex-shrink-0">
        <div class="flex items-center gap-3 min-w-0">
          <button onclick="toggleSidebar()" class="mobile-menu-btn w-9 h-9 rounded-lg hover:bg-slate-100 items-center justify-center text-slate-600" style="display:none">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="text-[1rem] font-black tracking-tight text-slate-800 truncate">통화 기록</h1>
          <span class="text-[.7rem] text-slate-400 tnum hidden sm:inline">총 1,243건</span>
        </div>
        <div class="flex items-center gap-2">
          <button class="btn-secondary hidden sm:inline-flex">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            CSV 내보내기
          </button>
          <button class="btn-primary">
            <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
            새 통화
          </button>
        </div>
      </header>

      <!-- Main split -->
      <main class="flex-1 grid lg:grid-cols-[1fr_420px] gap-0 overflow-hidden">

        <!-- List -->
        <section class="flex flex-col min-w-0 overflow-hidden lg:border-r border-slate-200">

          <!-- Filters -->
          <div class="px-4 lg:px-6 py-3 border-b border-slate-200 bg-white flex items-center gap-2 flex-wrap lg:justify-between flex-shrink-0">
            <div class="relative w-full lg:w-auto lg:max-w-xs">
              <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-400 absolute left-3 top-1/2 -translate-y-1/2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input type="text" id="searchInput" placeholder="고객명, 회사명, 키워드 검색"
                class="w-full pl-9 pr-3 py-2 rounded-lg border border-slate-200 bg-white text-[.82rem] outline-none focus:border-blue-400 focus:shadow-[0_0_0_4px_rgba(59,130,246,.12)] transition-all" />
            </div>
            <div class="flex items-center gap-1.5 flex-wrap">
              <button class="filter-chip active" data-filter="all">전체</button>
              <button class="filter-chip" data-filter="today">오늘</button>
              <button class="filter-chip" data-filter="week">이번 주</button>
              <button class="filter-chip" data-filter="closed">완료</button>
              <button class="filter-chip" data-filter="open">미완료</button>
              <button class="filter-chip" data-filter="follow">후속 필요</button>
            </div>
          </div>

          <!-- Table -->
          <div class="flex-1 overflow-y-auto scroll-area">
            <table class="tbl">
              <thead class="sticky top-0 z-10">

                  <th class="hidden md:table-cell">길이</th>

            </table>
          </div>
        </section>

        <!-- Detail panel -->

          </div>

          <!-- Detail content (hidden by default) -->
          <div id="detailContent" class="hidden flex-1 flex flex-col min-h-0">
            <!-- Header -->
            <div class="px-5 py-4 border-b border-slate-200 flex items-start justify-between gap-3">
              <div class="min-w-0">
                <div class="flex items-center gap-2 mb-1">
                  <span id="dCallId" class="text-[.78rem] font-bold text-slate-800"></span>
                  <span id="dStatus" class="badge"></span>
                </div>
                <div class="flex items-center gap-2 text-[.7rem] text-slate-500">
                  <span id="dDate"></span> · <span id="dDuration"></span>

              </div>
              <button onclick="closeDetail()" class="w-8 h-8 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-500 transition-colors">

              </button>
            </div>

            <!-- Customer -->
            <div class="px-5 py-4 border-b border-slate-200 flex items-center gap-3">
              <div id="dAvatar" class="w-11 h-11 rounded-full bg-gradient-to-br from-violet-500 to-blue-500 flex items-center justify-center text-white font-black"></div>
              <div class="min-w-0 flex-1">
                <div id="dCustomer" class="font-bold text-slate-800 truncate"></div>
                <div id="dCompany" class="text-[.75rem] text-slate-500 truncate"></div>
              </div>
              <button class="btn-secondary text-[.72rem]">고객 보기</button>
            </div>

            <!-- Tabs + content -->
            <div class="flex-1 overflow-y-auto scroll-area">
              <div class="px-5 py-4 space-y-4">

                <!-- Summary -->
                <section>
                  <div class="text-[.62rem] font-black uppercase tracking-wider text-slate-400 mb-2">통화 요약</div>
                  <div class="space-y-2">
                    <div class="rounded-lg border border-slate-200 bg-slate-50/50 p-3">
                      <div class="text-[.7rem] font-bold text-slate-600 mb-1">고객 니즈</div>
                      <p id="dNeeds" class="text-[.8rem] text-slate-700 leading-relaxed"></p>
                    </div>
                    <div class="rounded-lg border border-amber-200 bg-amber-50/50 p-3">
                      <div class="text-[.7rem] font-bold text-amber-700 mb-1">미해결 이슈</div>
                      <p id="dIssues" class="text-[.8rem] text-slate-700 leading-relaxed"></p>
                    </div>
                    <div class="rounded-lg border border-blue-200 bg-blue-50/40 p-3">
                      <div class="text-[.7rem] font-bold text-blue-700 mb-1.5">다음 액션</div>
                      <ul id="dActions" class="space-y-1 text-[.78rem] text-slate-700"></ul>
                    </div>
                  </div>
                </section>

                <!-- Transcript -->
                <section>
                  <div class="text-[.62rem] font-black uppercase tracking-wider text-slate-400 mb-2">전체 Transcript</div>
                  <div id="dTranscript" class="rounded-lg border border-slate-200 bg-white p-3 space-y-2.5"></div>
                </section>

                <!-- Tags -->
                <section>
                  <div class="text-[.62rem] font-black uppercase tracking-wider text-slate-400 mb-2">자동 태그</div>
                  <div id="dTags" class="flex flex-wrap gap-1.5"></div>
                </section>

              </div>
            </div>

            <!-- Footer actions -->
            <div class="px-5 py-3 border-t border-slate-200 flex gap-2 flex-shrink-0">
              <button class="btn-secondary flex-1 justify-center">
                <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                메모 추가

              <button class="btn-primary flex-1 justify-center">

                메일 발송
              </button>
            </div>
          </div>
        </aside>
      </main>

    </div>
  </div>

  <script src="_shared.js"></script>

      {

        type: '후속 미팅', duration: '18분 23초', date: '2026-05-02 14:17', status: '완료',
        statusBadge: 'badge-blue',
        summary: '온프레미스 배포 협의',
        needs: '금융권 보안 요구로 온프레미스 배포 필수',
        issues: 'IT 보안팀 검토 진행 중',
        actions: ['보안 감사 자료 패키지 발송', 'VPC 배포 견적'],
        tags: ['Enterprise', '온프레미스', '보안']
      },
    ];

    const tableEl = document.getElementById('callsTable');
    let activeFilter = 'all';
    let activeSearch = '';

    function renderTable() {
      tableEl.innerHTML = '';
      const filtered = calls.filter(c => {
        const q = activeSearch.toLowerCase();
        if (q && !(c.customer.toLowerCase().includes(q) || c.company.toLowerCase().includes(q) || c.summary.toLowerCase().includes(q))) return false;
        if (activeFilter === 'today' && !c.date.startsWith('2026-05-03')) return false;
        if (activeFilter === 'closed' && c.status !== '완료') return false;
        if (activeFilter === 'open' && c.status === '완료') return false;
        return true;
      });
      if (filtered.length === 0) {
        tableEl.innerHTML = `<tr><td colspan="6" class="text-center text-slate-400 py-12 text-[.85rem]">검색 결과가 없습니다.</td></tr>`;
        return;
      }
      filtered.forEach((c, idx) => {
        const tr = document.createElement('tr');
        tr.onclick = () => openDetail(c);
        const live = c.status === '진행중' ? '<span class="pulse-dot mr-1" style="width:6px;height:6px"></span>' : '';
        tr.innerHTML = `
          <td><span class="badge ${c.statusBadge}">${live}${c.status}</span></td>
          <td>
            <div class="flex items-center gap-2.5 min-w-0">
              <div class="w-8 h-8 rounded-full ${c.avatar} flex items-center justify-center text-[.7rem] font-black text-white shrink-0">${c.customer.slice(0,1)}</div>
              <div class="min-w-0">
                <div class="font-bold text-slate-800 text-[.85rem] truncate">${c.customer}</div>
                <div class="text-[.68rem] text-slate-400 truncate">${c.company}</div>
              </div>
            </div>
          </td>
          <td class="hidden sm:table-cell text-slate-600 text-[.78rem]">${c.type}</td>
          <td class="hidden md:table-cell text-slate-700 tnum text-[.78rem]">${c.duration}</td>
          <td class="text-slate-600 text-[.78rem] tnum">${c.date.slice(5).replace(' ', ' · ')}</td>
          <td class="hidden lg:table-cell text-slate-600 text-[.78rem] max-w-[260px] truncate">${c.summary}</td>
        `;
        tableEl.appendChild(tr);
      });
    }
    renderTable();

    // Search & filters
    document.getElementById('searchInput').addEventListener('input', (e) => {
      activeSearch = e.target.value;
      renderTable();
    });
    document.querySelectorAll('.filter-chip').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter = btn.dataset.filter;
        renderTable();
      });
    });

    // Detail
    function openDetail(c) {
      document.getElementById('detailEmpty').classList.add('hidden');
      const dc = document.getElementById('detailContent');
      dc.classList.remove('hidden');
      dc.classList.add('flex');
      document.getElementById('detailPanel').classList.add('open');

      document.getElementById('dCallId').textContent = c.id;
      const ds = document.getElementById('dStatus');
      ds.className = `badge ${c.statusBadge}`;
      ds.textContent = c.status;
      document.getElementById('dDate').textContent = c.date;
      document.getElementById('dDuration').textContent = `통화 ${c.duration}`;
      const ava = document.getElementById('dAvatar');
      ava.className = `w-11 h-11 rounded-full ${c.avatar} flex items-center justify-center text-white font-black`;
      ava.textContent = c.customer.slice(0,1);
      document.getElementById('dCustomer').textContent = c.customer + ' 고객';
      document.getElementById('dCompany').textContent = c.company + ' · ' + c.type;
      document.getElementById('dNeeds').textContent = c.needs;
      document.getElementById('dIssues').textContent = c.issues;
      document.getElementById('dActions').innerHTML = c.actions.map(a => `<li class="flex gap-1.5"><span class="text-blue-500 font-black shrink-0">→</span>${a}</li>`).join('');
      const tr = document.getElementById('dTranscript');
      tr.innerHTML = c.transcript.length ? c.transcript.map(t => `
        <div class="flex gap-1.5">
          <span class="text-[.55rem] px-1 rounded ${t.who === '고객' ? 'bg-slate-100 text-slate-500' : 'bg-blue-100 text-blue-700'} shrink-0 self-start mt-0.5 font-bold">${t.who}</span>
          <p class="text-[.78rem] text-slate-700 leading-snug">${t.text}</p>
        </div>
      `).join('') : '<div class="text-center py-3 text-slate-400 text-[.75rem]">Transcript 없음</div>';
      document.getElementById('dTags').innerHTML = c.tags.map(t => `<span class="badge badge-slate">${t}</span>`).join('');
    }
    function closeDetail() {
      document.getElementById('detailContent').classList.add('hidden');
      document.getElementById('detailContent').classList.remove('flex');
      document.getElementById('detailEmpty').classList.remove('hidden');
      document.getElementById('detailPanel').classList.remove('open');
    }
    window.closeDetail = closeDetail;
  </script>
</body>
</html>
