<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>실시간 통화 — Kloser</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
  <!-- DOMPurify is used to sanitize suggestion HTML before innerHTML render.
       If the CDN load fails, safeSuggestionHtml() returns an empty string
       (fail-safe) rather than letting unsanitized markup through. -->
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"
          crossorigin="anonymous"></script>
  <!-- Order matters: api.js publishes window.kloserApi which ws.js reads
       (apiBaseUrl + refreshAccessToken). Keep api.js BEFORE ws.js. -->
  <script src="api.js"></script>
  <script src="ws.js"></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard Variable', 'Pretendard', 'Inter', 'system-ui', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    html, body {
      height: 100%;
      font-family: 'Pretendard Variable', 'Pretendard', 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      letter-spacing: -0.01em;
      background: #f8fafc;
      color: rgb(15 23 42);
    }
    body { overflow: hidden; }

    .g-text {
      background: linear-gradient(120deg, #2563eb 0%, #06b6d4 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* Sidebar nav item */
    .nav-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 9px;
      color: rgb(71 85 105);
      font-size: .85rem;
      font-weight: 500;
      transition: all .15s;
      text-decoration: none;
      letter-spacing: -0.005em;
    }
    .nav-item:hover { background: rgb(241 245 249); color: rgb(15 23 42); }
    .nav-item.active { background: rgb(37 99 235); color: white; box-shadow: 0 4px 12px -4px rgba(37,99,235,.4); }
    .nav-item.active svg { color: white; }
    .nav-item svg { color: rgb(100 116 139); flex-shrink: 0; }

    /* Custom scrollbar */
    .scroll-area::-webkit-scrollbar { width: 6px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    .scroll-area::-webkit-scrollbar-thumb { background: rgb(203 213 225); border-radius: 3px; }
    .scroll-area::-webkit-scrollbar-thumb:hover { background: rgb(148 163 184); }

    /* Live indicator */
    .pulse-dot {
      position: relative;
      display: inline-flex;
      width: 8px;
      height: 8px;
    }
    .pulse-dot::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      background: rgb(16 185 129);
      opacity: .6;
      animation: ping 1.5s cubic-bezier(0,0,0.2,1) infinite;
    }
    .pulse-dot::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 9999px;
      background: rgb(16 185 129);
    }
    @keyframes ping { 75%, 100% { transform: scale(2.5); opacity: 0; } }

    /* Transcript message slide-in */
    .msg-enter {
      animation: msgIn .35s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* AI suggestion shimmer */
    .ai-shimmer {
      animation: aiPulse 2.4s ease-in-out infinite;
    }
    @keyframes aiPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(59,130,246,.18), 0 8px 24px -10px rgba(59,130,246,.18); }
      50% { box-shadow: 0 0 0 4px rgba(59,130,246,.12), 0 8px 24px -10px rgba(59,130,246,.3); }
    }

    /* Tabular nums */
    .tnum { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }

    /* Buttons */
    .btn-primary {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 8px;
      background: rgb(37 99 235); color: white;
      font-size: .82rem; font-weight: 700;
      transition: background .15s;
    }
    .btn-primary:hover { background: rgb(29 78 216); }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 8px 14px; border-radius: 8px;
      background: white; color: rgb(51 65 85);
      border: 1px solid rgb(226 232 240);
      font-size: .82rem; font-weight: 600;
      transition: all .15s;
    }
    .btn-secondary:hover { background: rgb(248 250 252); border-color: rgb(203 213 225); }
    .btn-danger {
      background: rgb(239 68 68); color: white;
      transition: background .15s;
    }
    .btn-danger:hover { background: rgb(220 38 38); }

    /* Audio bar */
    .audio-bar {
      display: inline-block;
      width: 2px;
      background: rgb(96 165 250);
      border-radius: 1px;
      transform-origin: bottom;
      animation: audio 1.1s ease-in-out infinite;
    }
    .audio-bar:nth-child(1) { animation-delay: 0s; height: 60%; }
    .audio-bar:nth-child(2) { animation-delay: .12s; height: 90%; }
    .audio-bar:nth-child(3) { animation-delay: .25s; height: 50%; }
    .audio-bar:nth-child(4) { animation-delay: .35s; height: 80%; }
    .audio-bar:nth-child(5) { animation-delay: .15s; height: 70%; }
    @keyframes audio {
      0%, 100% { transform: scaleY(.4); }
      50% { transform: scaleY(1); }
    }

    /* Suggestion card hover */
    .sug-card {
      transition: transform .15s, border-color .15s, box-shadow .15s;
    }

    /* Mobile sidebar */
    .sidebar-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.4);
      z-index: 40; opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    .sidebar-overlay.show { opacity: 1; pointer-events: auto; }

    @media (max-width: 1023px) {
      .sidebar-mobile {
        position: fixed; left: 0; top: 0; bottom: 0;
        transform: translateX(-100%);
        transition: transform .25s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 50;
        box-shadow: 0 24px 48px -12px rgba(15,23,42,.18);
      }
      .sidebar-mobile.open { transform: translateX(0); }
      .mobile-menu-btn { display: inline-flex !important; }

      /* main grid가 세로 스택 + 페이지 스크롤 */
      .workspace-grid {
        grid-template-columns: 1fr !important;
        overflow-y: auto !important;
        overflow-x: hidden;
        grid-auto-rows: min-content;
      }
      .workspace-grid > section {
        grid-column: span 1 !important;
        min-height: 0 !important;
      }
      /* 중앙 Transcript는 너무 짧지 않게 */
      .workspace-grid > section:nth-child(2) {
        min-height: 460px;
      }
      /* 내부 스크롤 영역들 모바일 max-height 제한 */
      #transcript { max-height: none; }
      #aiSuggestions { max-height: 360px; }
      #checklist { max-height: 180px; }

      /* top bar 통화 뱃지가 좁은 화면에서 줄바꿈되지 않게 폰트 살짝 작게 */
      header h1 + span { font-size: .6rem; }
    }
    @media (min-width: 1024px) {
      .mobile-menu-btn { display: none !important; }
    }
    @media (max-width: 480px) {
      /* 매우 좁은 화면 — 통화 진행 중 뱃지의 텍스트만 숨기고 점만 표시 */
      header h1 + span { padding: 0 6px; }
      header h1 + span .pulse-dot { width: 7px; height: 7px; }
    }
    .sug-card:hover {
      border-color: rgb(96 165 250);
      transform: translateY(-1px);
      box-shadow: 0 8px 20px -8px rgba(15,23,42,.1);
    }
  </style>
</head>

<body class="bg-slate-50">

  <div class="flex h-screen">

    <div id="sidebarSlot"></div>

    <!-- ═══════ MAIN ═══════ -->
    <div class="flex-1 flex flex-col min-w-0">

      <!-- Top bar -->
      <header class="h-[60px] px-4 lg:px-6 flex items-center justify-between bg-white border-b border-slate-200 flex-shrink-0">
        <div class="flex items-center gap-3">
          <button onclick="toggleSidebar()" class="mobile-menu-btn w-9 h-9 rounded-lg hover:bg-slate-100 items-center justify-center text-slate-600" style="display:none">
            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 class="text-[1rem] font-black tracking-tight text-slate-800">실시간 통화</h1>
          <span class="inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full bg-emerald-50 border border-emerald-200 text-emerald-700 text-[.65rem] font-bold">
            <span class="pulse-dot"></span>
            통화 진행 중
          </span>
        </div>

        <div class="flex items-center gap-2">
          <button id="notifBtn" class="w-9 h-9 rounded-lg hover:bg-slate-100 flex items-center justify-center text-slate-500 transition-colors relative">
            <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 0 1-3.46 0"/></svg>
            <span class="absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-rose-500 ring-2 ring-white"></span>
          </button>
        </div>
      </header>

      <!-- Workspace -->
      <main class="workspace-grid flex-1 grid grid-cols-12 gap-4 p-4 overflow-hidden">

        <!-- ─── LEFT: Call info & controls ─── -->
        <section class="col-span-3 flex flex-col gap-3 min-h-0">
          <!-- Customer card — Phase 5 Step 4: API-backed picker.
               name / company / title come from /customers via link-customer.
               Avatar initial is derived from the first character of name. -->
          <div class="rounded-xl border border-slate-200 bg-white p-4 flex-shrink-0 relative">
            <div class="flex items-center gap-3 mb-3">
              <div id="custAvatar" class="w-12 h-12 rounded-full bg-gradient-to-br from-slate-400 to-slate-500 flex items-center justify-center text-[1.1rem] font-black text-white">·</div>
              <div class="min-w-0 flex-1">
                <div id="custName" class="font-bold text-slate-800 truncate">고객 미선택</div>
                <div id="custMeta" class="text-[.78rem] text-slate-500 truncate">우측 버튼으로 고객을 선택하세요.</div>
              </div>
            </div>
            <div class="flex items-center gap-2 mb-4">
              <button id="custPickerBtn" type="button" class="text-[.7rem] font-bold text-blue-600 hover:text-blue-700 px-2 py-1 rounded-md hover:bg-blue-50">고객 선택/변경</button>
              <button id="custUnlinkBtn" type="button" class="text-[.7rem] font-bold text-slate-500 hover:text-rose-600 px-2 py-1 rounded-md hover:bg-rose-50 hidden">연결 해제</button>
              <span id="custLinkStatus" class="text-[.65rem] text-slate-400"></span>
            </div>
            <!-- Picker panel (inline, hidden by default) -->
            <div id="custPickerPanel" class="hidden mb-3 border border-slate-200 rounded-lg bg-slate-50/70 p-2">
              <input id="custPickerSearch" type="text" placeholder="이름 검색…" class="w-full px-2 py-1.5 text-[.78rem] border border-slate-200 rounded-md bg-white focus:outline-none focus:border-blue-400" />
              <div id="custPickerList" class="mt-2 max-h-48 overflow-y-auto space-y-1">
                <div class="text-[.72rem] text-slate-400 px-1">불러오는 중…</div>
              </div>
            </div>

            <!-- Live timer -->
            <div class="flex items-center justify-between rounded-lg bg-slate-50 px-3 py-2.5 mb-3">
              <div class="flex items-center gap-1.5">
                <span class="pulse-dot"></span>
                <span class="text-[.7rem] font-bold text-emerald-700">LIVE</span>
              </div>
              <div id="callTimer" class="text-[1.05rem] font-black text-slate-800 tnum tracking-tight">00:00:00</div>
            </div>

            <!-- Audio meter -->
            <div class="flex items-center gap-2 mb-4 px-1">
              <div class="flex items-end gap-[3px] h-5">
                <span class="audio-bar"></span><span class="audio-bar"></span>
                <span class="audio-bar"></span><span class="audio-bar"></span>
                <span class="audio-bar"></span>
              </div>
              <span class="text-[.65rem] font-bold text-slate-500">오디오 캡처 중</span>
            </div>

            <!-- Meta -->
            <dl class="space-y-2 text-[.78rem]">
              <div class="flex items-center justify-between">
                <dt class="text-slate-500">통화 유형</dt>
                <dd class="text-slate-800 font-bold">신규 인바운드</dd>
              </div>
              <div class="flex items-center justify-between">
                <dt class="text-slate-500">번호</dt>
                <dd class="text-slate-800 tnum">02-1234-5678</dd>
              </div>
              <div class="flex items-center justify-between">
                <dt class="text-slate-500">상담원</dt>
                <dd class="text-slate-800 font-bold">김민수</dd>
              </div>
              <div class="flex items-center justify-between">
                <dt class="text-slate-500">캡처 품질</dt>
                <dd class="flex items-center gap-1 text-emerald-600 font-bold">
                  <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>
                  우수
                </dd>
              </div>
            </dl>
          </div>

          <!-- Checklist -->
          <div class="rounded-xl border border-slate-200 bg-white p-4 flex flex-col min-h-0">
            <div class="flex items-center justify-between mb-3 flex-shrink-0">
              <div class="flex items-center gap-1.5">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" class="text-blue-600" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                <h3 class="text-[.82rem] font-bold text-slate-800">상담 체크리스트</h3>
              </div>
              <span class="text-[.65rem] text-slate-500 tnum"><span id="chkDone">2</span>/<span id="chkTotal">5</span></span>
            </div>
            <!-- Checklist items — Phase 5 Step 4: rendered from API
                 (call_checklist_items) once the call_id is known.
                 Title text is server-supplied (org template) — use
                 textContent only, never innerHTML. -->
            <ul id="checklist" class="space-y-2 flex-1 overflow-y-auto scroll-area pr-1 text-[.8rem]">
              <li class="text-[.74rem] text-slate-400 py-1" data-empty>통화 시작 후 항목이 표시됩니다.</li>
            </ul>
          </div>

          <!-- Controls -->
          <!-- 음소거 / 대기는 Phase 4 시점에는 (demo) — 실제 오디오 캡처 핸들러 없음.
               종료 버튼만 WS end_call에 wire. -->
          <div class="rounded-xl border border-slate-200 bg-white p-3 flex items-center gap-2 flex-shrink-0">
            <button class="flex-1 h-10 rounded-lg border border-slate-200 bg-white hover:bg-slate-50 flex items-center justify-center text-slate-700 transition-colors" title="음소거 (demo)">
              <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v3M8 22h8"/></svg>
            </button>
            <button class="flex-1 h-10 rounded-lg border border-slate-200 bg-white hover:bg-slate-50 flex items-center justify-center text-slate-700 transition-colors" title="대기 (demo)">
              <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
            </button>
            <button id="endCallBtn" class="flex-[2] h-10 rounded-lg btn-primary btn-danger justify-center" title="통화 종료">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" style="transform:rotate(135deg)"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.37 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.33 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              <span id="endCallLabel">종료</span>
            </button>
          </div>
        </section>

        <!-- ─── CENTER: Live transcript ─── -->
        <section class="col-span-5 flex flex-col min-h-0 rounded-xl border border-slate-200 bg-white overflow-hidden">
          <!-- Header -->
          <div class="px-4 py-3 border-b border-slate-200 flex items-center justify-between flex-shrink-0">
            <div class="flex items-center gap-2">
              <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" class="text-blue-600" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <h2 class="text-[.88rem] font-bold text-slate-800">실시간 대화 Transcript</h2>
              <span class="inline-flex items-center gap-1 px-1.5 py-0.5 rounded bg-blue-50 text-blue-700 text-[.6rem] font-black tracking-wider border border-blue-100">
                STT · Naver Clova
              </span>
            </div>
            <div class="flex items-center gap-1">
              <button class="px-2.5 py-1 rounded text-[.7rem] text-slate-500 hover:bg-slate-100 transition-colors flex items-center gap-1">
                <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8M21 3v5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16M8 16H3v5"/></svg>
                자동 스크롤
              </button>
              <button class="px-2.5 py-1 rounded text-[.7rem] text-slate-500 hover:bg-slate-100 transition-colors">검색</button>
            </div>
          </div>

          <!-- Transcript -->
          <div id="transcript" class="flex-1 overflow-y-auto scroll-area px-5 py-4 space-y-4 text-[.88rem] leading-relaxed">
            <!-- messages injected by JS -->
          </div>

          <!-- Note input -->
          <div class="border-t border-slate-200 px-4 py-3 flex items-center gap-2 flex-shrink-0 bg-slate-50/50">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" class="text-slate-400 flex-shrink-0" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            <input id="noteInput" type="text" placeholder="통화 중 빠른 메모를 남겨두세요..."
              class="flex-1 bg-transparent outline-none text-[.82rem] text-slate-700 placeholder:text-slate-400" />
            <span id="noteStatus" class="text-[.62rem] text-slate-400 hidden"></span>
            <button id="noteSaveBtn" type="button" class="text-[.7rem] font-bold text-blue-600 hover:bg-blue-50 px-2 py-1 rounded transition-colors">저장</button>
          </div>
        </section>

        <!-- ─── RIGHT: AI Assistant ─── -->
        <section class="col-span-4 flex flex-col gap-3 min-h-0">

          <!-- Sentiment -->
          <div class="rounded-xl border border-slate-200 bg-white p-4 flex-shrink-0">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-1.5">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" class="text-blue-600" viewBox="0 0 24 24"><path d="M21 12c0 4.97-4.03 9-9 9s-9-4.03-9-9 4.03-9 9-9 9 4.03 9 9zM9 9h.01M15 9h.01M9 15c1.5 1 3.5 1 6 0"/></svg>
                <span class="text-[.78rem] font-bold text-slate-800">고객 상태 분석</span>
              </div>
              <div class="flex items-center gap-2">
                <span id="latencyVal" class="text-[.55rem] font-bold text-slate-400 tnum" title="WebSocket round-trip latency">— ms</span>
                <span class="text-[.6rem] font-bold text-slate-400">실시간</span>
              </div>
            </div>
            <div class="grid grid-cols-3 gap-2 text-center">
              <div class="rounded-lg bg-slate-50 px-2 py-2.5">
                <div class="text-[.62rem] text-slate-500 mb-1">감정</div>
                <div id="moodVal" class="text-[.85rem] font-black text-emerald-600">긍정</div>
              </div>
              <div class="rounded-lg bg-slate-50 px-2 py-2.5">
                <div class="text-[.62rem] text-slate-500 mb-1">관심도</div>
                <div id="interestVal" class="text-[.85rem] font-black text-blue-600 tnum">87%</div>
              </div>
              <div class="rounded-lg bg-slate-50 px-2 py-2.5">
                <div class="text-[.62rem] text-slate-500 mb-1">단계</div>
                <div id="stageVal" class="text-[.85rem] font-black text-violet-600">검토</div>
              </div>
            </div>
          </div>

          <!-- AI Suggestions -->
          <div class="rounded-xl border-2 border-blue-200 bg-gradient-to-br from-blue-50/40 via-white to-cyan-50/30 ai-shimmer flex flex-col min-h-0 flex-1">
            <div class="px-4 py-3 border-b border-blue-100 flex items-center justify-between flex-shrink-0">
              <div class="flex items-center gap-2">
                <div class="w-7 h-7 rounded-lg bg-gradient-to-br from-blue-600 to-cyan-500 flex items-center justify-center text-[.62rem] font-black text-white shadow-md">AI</div>
                <div>
                  <h2 class="text-[.85rem] font-black text-slate-800">AI 어시스턴트 제안</h2>
                  <div class="text-[.62rem] text-slate-500">회사 가이드 + 실시간 대화 기반</div>
                </div>
              </div>
              <span class="inline-flex items-center gap-1 text-[.6rem] font-bold text-emerald-600">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                갱신 중
              </span>
            </div>

            <div id="aiSuggestions" class="flex-1 overflow-y-auto scroll-area px-4 py-3 space-y-3">
              <!-- AI cards injected by JS -->
            </div>

            <!-- Quick send -->
            <div class="border-t border-blue-100 px-4 py-3 flex-shrink-0">
              <div class="text-[.62rem] font-black text-blue-700 tracking-wider uppercase mb-2">빠른 응대 멘트</div>
              <div class="flex flex-wrap gap-1.5">
                <button class="px-2.5 py-1 rounded bg-white border border-blue-200 text-[.7rem] text-slate-700 hover:border-blue-400 transition-colors font-medium">감사 인사 + 일정 제안</button>
                <button class="px-2.5 py-1 rounded bg-white border border-blue-200 text-[.7rem] text-slate-700 hover:border-blue-400 transition-colors font-medium">자료 발송 안내</button>
                <button class="px-2.5 py-1 rounded bg-white border border-blue-200 text-[.7rem] text-slate-700 hover:border-blue-400 transition-colors font-medium">데모 제안</button>
              </div>
            </div>
          </div>

        </section>

      </main>

    </div>
  </div>

  <script src="_shared.js"></script>
  <script>
    renderSidebar('live');
    if (typeof renderNotification === 'function') renderNotification('notifBtn');

    /* ────────────────────────────────────────────────
       Transcript 렌더링
       (Phase 0.5: setTimeout mock 제거됨. 이벤트는 서버에서 푸시)
    ──────────────────────────────────────────────── */
    const transcriptEl = document.getElementById('transcript');
    const aiSuggestionsEl = document.getElementById('aiSuggestions');
    const callTimerEl = document.getElementById('callTimer');
    const latencyEl = document.getElementById('latencyVal');

    const startedAt = Date.now();

    function fmtTime(sec) {
      const h = String(Math.floor(sec / 3600)).padStart(2, '0');
      const m = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
      const s = String(sec % 60).padStart(2, '0');
      return `${h}:${m}:${s}`;
    }

    setInterval(() => {
      const sec = Math.floor((Date.now() - startedAt) / 1000);
      callTimerEl.textContent = fmtTime(sec);
    }, 250);

    function timestampNow() {
      const now = new Date();
      return `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
    }

    /* transcript bubble 본문은 textContent로 주입 — XSS 방어 (Day 3) */
    function appendMessage(msg) {
      const isAgent = msg.who === 'agent';
      const wrapper = document.createElement('div');
      wrapper.className = `flex gap-3 msg-enter ${isAgent ? 'flex-row-reverse' : ''}`;

      const avatar = document.createElement('div');
      avatar.className = `w-8 h-8 rounded-full ${isAgent ? 'bg-blue-100 text-blue-700' : 'bg-slate-100 text-slate-600'} flex items-center justify-center text-[.7rem] font-black flex-shrink-0`;
      avatar.textContent = isAgent ? '나' : '客';

      const col = document.createElement('div');
      col.className = `flex flex-col ${isAgent ? 'items-end' : 'items-start'} max-w-[78%]`;

      const meta = document.createElement('div');
      meta.className = `flex items-center gap-1.5 mb-1 ${isAgent ? 'flex-row-reverse' : ''}`;
      const speakerLabel = document.createElement('span');
      speakerLabel.className = `text-[.7rem] font-bold ${isAgent ? 'text-blue-700' : 'text-slate-700'}`;
      speakerLabel.textContent = isAgent ? '상담원 (나)' : '김민수 (고객)';
      const tsLabel = document.createElement('span');
      tsLabel.className = 'text-[.62rem] text-slate-400 tnum';
      tsLabel.textContent = timestampNow();
      meta.appendChild(speakerLabel);
      meta.appendChild(tsLabel);

      const bubble = document.createElement('div');
      bubble.className = `rounded-2xl px-3.5 py-2.5 text-slate-800 leading-snug ${isAgent ? 'bg-blue-50 border border-blue-100 rounded-tr-sm' : 'bg-slate-50 border border-slate-100 rounded-tl-sm'}`;
      bubble.textContent = msg.text;

      col.appendChild(meta);
      col.appendChild(bubble);
      wrapper.appendChild(avatar);
      wrapper.appendChild(col);

      transcriptEl.appendChild(wrapper);
      transcriptEl.scrollTo({ top: transcriptEl.scrollHeight, behavior: 'smooth' });
    }

    /* AI suggestion rendering */
    const toneStyles = {
      blue: 'border-blue-200 bg-blue-50/60',
      cyan: 'border-cyan-200 bg-cyan-50/50',
      amber: 'border-amber-200 bg-amber-50/60',
      rose: 'border-rose-200 bg-rose-50/60',
      emerald: 'border-emerald-200 bg-emerald-50/60',
      slate: 'border-slate-200 bg-slate-50/60',
    };
    const toneTitleColor = {
      blue: 'text-blue-700',
      cyan: 'text-cyan-700',
      amber: 'text-amber-700',
      rose: 'text-rose-700',
      emerald: 'text-emerald-700',
      slate: 'text-slate-600',
    };
    const toneIcon = {
      direction: '<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg>',
      script: '<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>',
      alert: '<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg>',
      risk: '<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01"/></svg>',
      next: '<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>',
      kb: '<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M9 7h6M9 11h6M9 15h4"/></svg>',
    };

    // Sanitize HTML that ends up in innerHTML. DOMPurify is loaded in
    // <head> as a CDN script. If the CDN was blocked or the script
    // failed, return an empty string rather than letting raw HTML
    // through — Phase 5 will eventually feed real LLM output through
    // this same path, so failing safe matters now.
    //
    // Note: USE_PROFILES.html drops <svg> by design. We split rendering
    // so that local trusted constants (toneIcon SVGs) bypass DOMPurify
    // and only server-supplied strings (title, body) go through it.
    function safeSuggestionHtml(html) {
      if (!window.DOMPurify || typeof window.DOMPurify.sanitize !== 'function') {
        console.warn('[live] DOMPurify missing; suppressing unsanitized suggestion HTML');
        return '';
      }
      return window.DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
    }

    function renderSuggestions(group) {
      // Smooth swap: fade out, then fade in
      aiSuggestionsEl.style.opacity = '0';
      setTimeout(() => {
        aiSuggestionsEl.innerHTML = '';
        group.suggestions.forEach((s, i) => {
          const card = document.createElement('div');
          card.className = `sug-card rounded-lg border ${toneStyles[s.tone]} p-3`;
          card.style.animation = `msgIn .35s cubic-bezier(0.16,1,0.3,1) ${i*0.06}s both`;
          if (s.id) card.dataset.suggestionId = s.id;

          const header = document.createElement('div');
          header.className = `flex items-center gap-1.5 mb-1.5 ${toneTitleColor[s.tone] || ''}`;

          // toneIcon[s.type] is a static local SVG string — trusted, no
          // sanitize. Wrapping in a span keeps innerHTML scoped.
          const iconWrap = document.createElement('span');
          iconWrap.className = 'inline-flex shrink-0';
          iconWrap.innerHTML = toneIcon[s.type] || '';
          header.appendChild(iconWrap);

          // Title comes from the server payload — DOMPurify on the way in.
          const title = document.createElement('span');
          title.className = 'text-[.65rem] font-black uppercase tracking-wider';
          title.innerHTML = safeSuggestionHtml(String(s.title || ''));
          header.appendChild(title);

          // Body also from the server (the spike fixture uses <b>/<br>),
          // sanitize for the same reason.
          const body = document.createElement('p');
          body.className = 'text-[.78rem] text-slate-700 leading-relaxed';
          body.innerHTML = safeSuggestionHtml(String(s.body || ''));

          card.appendChild(header);
          card.appendChild(body);

          // Phase 5 Step 4 — use/dismiss controls only when the card
          // carries a persisted id. Phase 0.5 demo replay groups don't
          // have ids; in that case we omit the buttons entirely so the
          // user can't trigger a 4xx against an empty endpoint.
          if (s.id) {
            const actions = document.createElement('div');
            actions.className = 'flex items-center justify-end gap-2 mt-2';

            const useBtn = document.createElement('button');
            useBtn.type = 'button';
            useBtn.className = 'text-[.7rem] font-bold text-blue-600 hover:text-blue-700 px-2 py-1 rounded-md hover:bg-blue-50';
            useBtn.textContent = '사용';
            useBtn.addEventListener('click', () => window.__liveSuggestionAction && window.__liveSuggestionAction(s.id, 'use', card));

            const dismissBtn = document.createElement('button');
            dismissBtn.type = 'button';
            dismissBtn.className = 'text-[.7rem] font-bold text-slate-500 hover:text-rose-600 px-2 py-1 rounded-md hover:bg-rose-50';
            dismissBtn.textContent = '닫기';
            dismissBtn.addEventListener('click', () => window.__liveSuggestionAction && window.__liveSuggestionAction(s.id, 'dismiss', card));

            actions.appendChild(useBtn);
            actions.appendChild(dismissBtn);
            card.appendChild(actions);
          }

          aiSuggestionsEl.appendChild(card);
        });
        aiSuggestionsEl.style.opacity = '1';
      }, 180);
    }

    // Initial AI suggestion (greeting state)
    renderSuggestions({
      suggestions: [
        {
          type: 'direction',
          title: '대기 중',
          body: '고객 발화를 분석 중입니다. 첫 응대 후 추천이 시작됩니다.',
          tone: 'slate'
        }
      ]
    });

    /* sentiment 갱신 — Day 3에서 인라인 if-체인을 함수로 추출 */
    const moodToneClass = {
      '관심': 'text-[.85rem] font-black text-blue-600',
      '망설임': 'text-[.85rem] font-black text-amber-600',
      '재고려': 'text-[.85rem] font-black text-violet-600',
    };
    function updateSentiment({ mood, interest, stage } = {}) {
      const moodEl = document.getElementById('moodVal');
      const interestElNode = document.getElementById('interestVal');
      const stageElNode = document.getElementById('stageVal');
      if (mood && moodEl) {
        moodEl.textContent = mood;
        moodEl.className = moodToneClass[mood] || 'text-[.85rem] font-black text-slate-600';
      }
      if (typeof interest === 'number' && interestElNode) {
        interestElNode.textContent = `${interest}%`;
      }
      if (stage && stageElNode) {
        stageElNode.textContent = stage;
      }
    }

    /* ────────────────────────────────────────────────
       Live WebSocket 연결 (Phase 1 step 4 + Phase 4 step 4 persistence wiring)
       — Phase 0.5의 setTimeout mock 제거 + auth gate.
       — userId query는 폐기, JWT가 socket.handshake.auth.token으로 들어감.
       — Phase 4: start_call ack의 callId를 보관해서 종료 버튼 / 메모 input /
         (실패 시) REST end-call 가드에 사용.
    ──────────────────────────────────────────────── */

    // 페이지 전역 통화 상태. start_call ack에서 callId를 받으면 채우고, 종료
    // 시 status='ended'로 옮긴다. 메모 input과 종료 버튼이 같은 state를 참조.
    const callState = {
      callId: null,
      status: 'idle',  // 'idle' | 'live' | 'ending' | 'ended' | 'failed'
      socket: null,
    };

    function setEndButton(label, disabled) {
      const btn = document.getElementById('endCallBtn');
      const lbl = document.getElementById('endCallLabel');
      if (lbl) lbl.textContent = label;
      if (btn) btn.disabled = !!disabled;
    }

    function setNoteStatus(text, tone) {
      const el = document.getElementById('noteStatus');
      if (!el) return;
      el.textContent = text || '';
      el.classList.toggle('hidden', !text);
      el.style.color = tone === 'error' ? 'rgb(190 18 60)' :
                       tone === 'ok'    ? 'rgb(5 150 105)' :
                                          'rgb(100 116 139)';
    }

    (async () => {
      // Auth gate: ensure an access token is in memory. On a fresh
      // page load the memory is empty — try refreshAccessToken first,
      // which uses the HttpOnly refresh cookie. If that fails, the
      // user is not logged in and we bounce to login.html with the
      // current path preserved as returnUrl.
      if (!window.kloserApi) {
        console.error('[live] kloserApi not loaded — api.js missing?');
        return;
      }
      if (!window.kloserApi.getAccessToken()) {
        try {
          await window.kloserApi.refreshAccessToken();
        } catch (err) {
          console.warn('[live] no session; redirecting to login', err && err.status);
          window.kloserApi.loginRedirect();
          return;
        }
      }

      // Unverified email banner (Phase 3 Step 6). /me responds with the
      // public user shape including email_verified_at.
      //
      // Phase 6 Step 5: also stash the membership role so non-writer
      // roles (viewer) can skip server mutations that would 403 — most
      // notably `POST /calls/:id/checklist/initialize`. Without this
      // gate the page still works, but the browser logs a console error
      // for the 403 which the historical e2e captures as a failure.
      try {
        const meRes = await window.kloserApi.apiGet('/me');
        if (meRes.ok) {
          const meBody = await meRes.json();
          if (typeof window.renderUnverifiedBanner === 'function') {
            window.renderUnverifiedBanner(meBody.user);
          }
          if (meBody && meBody.membership && meBody.membership.role) {
            callState.role = meBody.membership.role;
          }
        }
      } catch (err) {
        console.warn('[live] /me failed', err);
      }

      if (!window.kloserWS) {
        console.error('[live] kloserWS not loaded — ws.js missing?');
        return;
      }

      const socket = window.kloserWS.connectCallNamespace({
        baseUrl: window.kloserApi.apiBaseUrl,
        tokenProvider: () => window.kloserApi.getAccessToken(),
        onAuthFailure: () => window.kloserApi.loginRedirect(),
      });
      callState.socket = socket;

      // 리스너는 startCall 전에 등록 — 서버가 ack 직후 발사를 시작해도 첫 이벤트를 놓치지 않도록
      window.kloserWS.onTranscript(socket, (ev) => {
        appendMessage({ who: ev.who, text: ev.text });
        if (typeof ev.clientSentAt === 'number' && latencyEl) {
          const rtt = Date.now() - ev.clientSentAt;
          console.log('[live] rtt', rtt, 'ms');
          latencyEl.textContent = `${rtt}ms`;
        }
      });

      window.kloserWS.onSuggestion(socket, (group) => {
        renderSuggestions(group);
      });

      window.kloserWS.onSentiment(socket, (s) => {
        updateSentiment(s);
      });

      window.kloserWS.onError(socket, (err) => {
        console.error('[live] server error', err);
      });

      // start_call: Phase 4 시점에는 demo customer가 없으므로 customerId를
      // 빈 객체로 호출한다 (서버는 UUID 외 값은 NULL로 흡수). DB에 customer_id
      // NULL 통화 row가 만들어지고, ack의 callId를 보관한다.
      try {
        const ack = await window.kloserWS.startCall(socket, {});
        if (ack && typeof ack.callId === 'string') {
          callState.callId = ack.callId;
          callState.status = 'live';
          console.log('[live] start_call ack', ack);
        } else {
          callState.status = 'failed';
          console.error('[live] start_call persistence failed', ack);
          setEndButton('재시도 필요', true);
        }
      } catch (err) {
        callState.status = 'failed';
        console.error('[live] startCall failed', err);
        setEndButton('재시도 필요', true);
      }

      // beforeunload는 best-effort. WS end_call만 emit하고 REST는 호출하지
      // 않는다 — 두 경로가 모두 service.endCall을 호출하면 동일 row를 두 번
      // 종료 시도해서 ended_at이 흔들릴 수 있다 (단일 종결 경로 유지).
      window.addEventListener('beforeunload', () => {
        if (callState.status !== 'live') return;
        try { window.kloserWS.endCall(socket); } catch (_) { /* ignore */ }
      });
    })().catch((err) => console.error('[live] init failed', err));

    /* 종료 버튼 — WS end_call 한 번만. ack ok이면 UI lock + ended 표시. */
    document.getElementById('endCallBtn').addEventListener('click', async () => {
      if (callState.status !== 'live') return;
      callState.status = 'ending';
      setEndButton('종료 중…', true);
      try {
        const ack = await window.kloserWS.endCall(callState.socket);
        if (ack && ack.ok) {
          callState.status = 'ended';
          setEndButton('종료됨', true);
        } else {
          callState.status = 'failed';
          console.error('[live] endCall ack', ack);
          setEndButton('종료 실패', true);
        }
      } catch (err) {
        callState.status = 'failed';
        console.error('[live] endCall threw', err);
        setEndButton('종료 실패', true);
      }
    });

    /* 빠른 메모 저장 — /calls/:id/notes. callId가 없으면 비활성. */
    async function saveLiveNotes() {
      const input = document.getElementById('noteInput');
      if (!input) return;
      const notes = input.value.trim();
      if (!callState.callId) {
        setNoteStatus('통화 식별자 대기 중', 'error');
        return;
      }
      setNoteStatus('저장 중…', 'info');
      try {
        const res = await window.kloserApi.patchCallNotes(callState.callId, notes || null);
        if (res.ok) {
          setNoteStatus('저장됨', 'ok');
          setTimeout(() => setNoteStatus('', null), 1800);
        } else if (res.status === 403) {
          const body = await res.json().catch(() => null);
          if (body && body.code === 'email_not_verified') {
            setNoteStatus('이메일 인증 필요', 'error');
          } else {
            setNoteStatus('권한 없음', 'error');
          }
        } else if (res.status === 404) {
          setNoteStatus('통화를 찾을 수 없음', 'error');
        } else {
          setNoteStatus('저장 실패', 'error');
        }
      } catch (err) {
        console.error('[live] saveLiveNotes failed', err);
        setNoteStatus('저장 실패', 'error');
      }
    }
    document.getElementById('noteSaveBtn').addEventListener('click', saveLiveNotes);
    document.getElementById('noteInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        saveLiveNotes();
      }
    });

    // ─────────────────────────────────────────────
    // Phase 5 Step 4 — live API wiring:
    //   1) customer picker + link/unlink
    //   2) checklist initialize/list/toggle from API
    //   3) WS heartbeat 20s
    //   4) suggestion use/dismiss for persisted (id-carrying) cards
    //   5) window.__liveCallState dev/e2e snapshot
    //
    // XSS gate: every dynamic value rendered into the customer card,
    // checklist list, and picker list is server-returned text. All of
    // it lands via textContent — no innerHTML for server data here.
    // The suggestion card path still goes through DOMPurify upstream.
    // ─────────────────────────────────────────────
    (function () {
      const api = window.kloserApi;
      if (!api) return;

      // Extend callState in-place; the outer scope already declared it.
      callState.customerId = null;
      callState.customerLinkStatus = null;
      callState.checklist = [];          // [{ id, template_id, title, status }]
      callState.heartbeat = {
        lastSeenAt: null,
        intervalId: null,
        lastError: null,
      };

      // ─── DOM refs ───
      const custName = document.getElementById('custName');
      const custMeta = document.getElementById('custMeta');
      const custAvatar = document.getElementById('custAvatar');
      const custPickerBtn = document.getElementById('custPickerBtn');
      const custPickerPanel = document.getElementById('custPickerPanel');
      const custPickerSearch = document.getElementById('custPickerSearch');
      const custPickerList = document.getElementById('custPickerList');
      const custUnlinkBtn = document.getElementById('custUnlinkBtn');
      const custLinkStatus = document.getElementById('custLinkStatus');
      const checklistUl = document.getElementById('checklist');
      const chkDoneEl = document.getElementById('chkDone');
      const chkTotalEl = document.getElementById('chkTotal');

      // ─── helpers ───
      function statusFromCode(code) {
        if (code === 403) return '권한 없음';
        if (code === 404) return '대상 없음';
        if (code === 409) return '이미 처리됨';
        if (code === 400) return '입력 오류';
        return '오류 ' + code;
      }

      function setCustomerLinkStatus(text, tone) {
        custLinkStatus.textContent = text || '';
        custLinkStatus.style.color =
          tone === 'error' ? 'rgb(190 18 60)' :
          tone === 'ok'    ? 'rgb(5 150 105)' :
                             'rgb(100 116 139)';
      }

      function renderCustomerCard(customer) {
        if (!customer) {
          custName.textContent = '고객 미선택';
          custMeta.textContent = '우측 버튼으로 고객을 선택하세요.';
          custAvatar.textContent = '·';
          custUnlinkBtn.classList.add('hidden');
          return;
        }
        const name = customer.name || '(이름 없음)';
        custName.textContent = name;
        const company = customer.company || '';
        const title = customer.title || '';
        const metaParts = [company, title].filter(Boolean);
        custMeta.textContent = metaParts.length ? metaParts.join(' · ') : (customer.email || customer.phone || '');
        custAvatar.textContent = (name.charAt(0) || '·').toUpperCase();
        custUnlinkBtn.classList.remove('hidden');
      }

      // ─── customer picker ───
      let customersCache = [];
      let customersLoaded = false;
      async function loadCustomersOnce() {
        if (customersLoaded) return;
        try {
          const res = await api.apiGet('/customers?limit=50');
          if (!res.ok) {
            custPickerList.textContent = 'API 오류: ' + statusFromCode(res.status);
            return;
          }
          const body = await res.json();
          customersCache = Array.isArray(body && body.items) ? body.items : [];
          customersLoaded = true;
          renderPickerList('');
        } catch (err) {
          console.warn('[live] /customers load failed', err);
          custPickerList.textContent = '고객 목록 로드 실패';
        }
      }

      function renderPickerList(filter) {
        custPickerList.innerHTML = '';
        const q = (filter || '').toLowerCase();
        const items = customersCache.filter((c) => {
          if (!q) return true;
          const hay = ((c.name || '') + ' ' + (c.company || '') + ' ' + (c.email || '')).toLowerCase();
          return hay.indexOf(q) !== -1;
        });
        if (items.length === 0) {
          const empty = document.createElement('div');
          empty.className = 'text-[.72rem] text-slate-400 px-1 py-2';
          empty.textContent = '일치하는 고객이 없습니다.';
          custPickerList.appendChild(empty);
          return;
        }
        for (const c of items.slice(0, 50)) {
          const row = document.createElement('button');
          row.type = 'button';
          row.className = 'w-full text-left px-2 py-1.5 rounded-md hover:bg-white border border-transparent hover:border-slate-200';
          const name = document.createElement('div');
          name.className = 'text-[.78rem] font-bold text-slate-800';
          name.textContent = c.name || '(이름 없음)';
          const meta = document.createElement('div');
          meta.className = 'text-[.7rem] text-slate-500';
          meta.textContent = [c.company, c.title, c.email].filter(Boolean).join(' · ');
          row.appendChild(name);
          row.appendChild(meta);
          row.addEventListener('click', () => linkCustomer(c));
          custPickerList.appendChild(row);
        }
      }

      async function linkCustomer(customer) {
        if (!callState.callId) {
          setCustomerLinkStatus('통화 식별자 대기 중', 'error');
          return;
        }
        setCustomerLinkStatus('연결 중…');
        try {
          const res = await api.linkCallCustomer(callState.callId, customer.id);
          if (res.ok) {
            callState.customerId = customer.id;
            renderCustomerCard(customer);
            setCustomerLinkStatus('연결됨', 'ok');
            custPickerPanel.classList.add('hidden');
            updateLiveCallStateSnapshot();
          } else if (res.status === 403) {
            setCustomerLinkStatus('권한 없음', 'error');
          } else if (res.status === 400) {
            setCustomerLinkStatus('다른 회사 고객은 연결할 수 없습니다', 'error');
          } else {
            setCustomerLinkStatus(statusFromCode(res.status), 'error');
          }
        } catch (err) {
          console.warn('[live] linkCustomer failed', err);
          setCustomerLinkStatus('네트워크 오류', 'error');
        }
      }

      async function unlinkCustomer() {
        if (!callState.callId) return;
        setCustomerLinkStatus('해제 중…');
        try {
          const res = await api.unlinkCallCustomer(callState.callId);
          if (res.ok) {
            callState.customerId = null;
            renderCustomerCard(null);
            setCustomerLinkStatus('해제됨', 'ok');
            updateLiveCallStateSnapshot();
          } else {
            setCustomerLinkStatus(statusFromCode(res.status), 'error');
          }
        } catch (err) {
          console.warn('[live] unlinkCustomer failed', err);
          setCustomerLinkStatus('네트워크 오류', 'error');
        }
      }

      custPickerBtn.addEventListener('click', async () => {
        const hidden = custPickerPanel.classList.toggle('hidden');
        if (!hidden) await loadCustomersOnce();
      });
      custPickerSearch.addEventListener('input', (e) => renderPickerList(e.target.value));
      custUnlinkBtn.addEventListener('click', unlinkCustomer);

      // ─── checklist ───
      function renderChecklist() {
        checklistUl.innerHTML = '';
        if (callState.checklist.length === 0) {
          const empty = document.createElement('li');
          empty.className = 'text-[.74rem] text-slate-400 py-1';
          empty.textContent = '활성화된 체크리스트 항목이 없습니다.';
          checklistUl.appendChild(empty);
        }
        let done = 0;
        for (const item of callState.checklist) {
          const li = document.createElement('li');
          li.dataset.itemId = item.id;
          li.dataset.done = item.status === 'done' ? '1' : '0';
          li.className = 'flex items-center gap-2 ' + (item.status === 'done'
            ? 'text-slate-400 line-through'
            : 'text-slate-700');

          const btn = document.createElement('button');
          btn.type = 'button';
          if (item.status === 'done') {
            btn.className = 'w-4 h-4 rounded border-2 border-blue-500 bg-blue-500 flex items-center justify-center shrink-0 cursor-pointer';
            btn.innerHTML = '<svg width="9" height="9" fill="none" stroke="white" stroke-width="3.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>';
            done += 1;
          } else {
            btn.className = 'w-4 h-4 rounded border-2 border-slate-300 hover:border-blue-400 shrink-0 cursor-pointer';
          }
          btn.addEventListener('click', () => toggleChecklistItem(item.id));

          li.appendChild(btn);

          // Title text — server-supplied. textContent only.
          const span = document.createElement('span');
          span.textContent = item.title || '(제목 없음)';
          li.appendChild(span);

          checklistUl.appendChild(li);
        }
        if (chkDoneEl) chkDoneEl.textContent = String(done);
        if (chkTotalEl) chkTotalEl.textContent = String(callState.checklist.length);
        updateLiveCallStateSnapshot();
      }

      async function hydrateChecklistAfterStart() {
        if (!callState.callId) return;
        try {
          // Initialize creates rows for active templates (idempotent),
          // then returns the current list. The mutation is writer-gated
          // (admin / manager / employee) — Phase 6 Step 5 added the
          // `callState.role !== 'viewer'` short-circuit so viewer pages
          // don't fire a guaranteed-403 POST that the browser surfaces
          // as a console error.
          if (callState.role !== 'viewer') {
            const initRes = await api.initializeCallChecklist(callState.callId);
            if (initRes.ok) {
              const body = await initRes.json();
              callState.checklist = await enrichChecklistTitles(body.items || []);
              renderChecklist();
              return;
            }
          }
          // 403/404 (or viewer skipped init) falls through to plain GET —
          // the read endpoint is open to any same-org user.
          const listRes = await api.listCallChecklist(callState.callId);
          if (listRes.ok) {
            const body = await listRes.json();
            callState.checklist = await enrichChecklistTitles(body.items || []);
            renderChecklist();
          }
        } catch (err) {
          console.warn('[live] checklist load failed', err);
        }
      }

      // call_checklist_items rows carry template_id but not the title
      // — fetch the templates list once and join by id. Templates are
      // org-wide and small; cache for the page lifetime.
      let templatesById = null;
      async function enrichChecklistTitles(items) {
        if (!templatesById) {
          templatesById = new Map();
          try {
            const tres = await api.listChecklistTemplates();
            if (tres.ok) {
              const tb = await tres.json();
              for (const t of (tb.items || [])) templatesById.set(t.id, t.title);
            }
          } catch (err) {
            console.warn('[live] templates load failed', err);
          }
        }
        return items.map((it) => Object.assign({}, it, {
          title: templatesById.get(it.template_id) || it.template_id,
        }));
      }

      async function toggleChecklistItem(itemId) {
        const cur = callState.checklist.find((x) => x.id === itemId);
        if (!cur) return;
        const next = cur.status === 'done' ? 'open' : 'done';
        try {
          const res = await api.patchCallChecklistItemStatus(itemId, next);
          if (res.ok) {
            const body = await res.json();
            cur.status = body.item ? body.item.status : next;
            renderChecklist();
          } else if (res.status === 403) {
            setCustomerLinkStatus('체크리스트 권한 없음', 'error');
          } else {
            console.warn('[live] checklist toggle status', res.status);
          }
        } catch (err) {
          console.warn('[live] checklist toggle failed', err);
        }
      }
      // backward-compat: legacy inline onclick="toggleChk(this)" — no-op now.
      window.toggleChk = function () { /* deprecated — Phase 5 Step 4 */ };

      // ─── heartbeat ───
      function startHeartbeat() {
        if (!window.kloserWS || typeof window.kloserWS.sendHeartbeat !== 'function') return;
        if (callState.heartbeat.intervalId) return;
        const tick = async () => {
          if (!callState.socket || callState.status !== 'live') return;
          try {
            const ack = await window.kloserWS.sendHeartbeat(callState.socket);
            callState.heartbeat.lastError = ack && ack.ok ? null : (ack && ack.error) || 'unknown';
            if (ack && ack.ok) {
              callState.heartbeat.lastSeenAt = ack.lastSeenAt || new Date().toISOString();
            } else if (ack && ack.error === 'call_ended') {
              // Server says the call is no longer in_progress — stop pinging.
              stopHeartbeat();
            }
          } catch (err) {
            console.warn('[live] heartbeat failed', err);
            callState.heartbeat.lastError = String(err && err.message || err);
          }
          updateLiveCallStateSnapshot();
        };
        // Fire one immediately, then every 20s (master plan §2 decision 11).
        tick();
        callState.heartbeat.intervalId = setInterval(tick, 20000);
      }

      function stopHeartbeat() {
        if (callState.heartbeat.intervalId) {
          clearInterval(callState.heartbeat.intervalId);
          callState.heartbeat.intervalId = null;
        }
      }

      // ─── suggestion use/dismiss ───
      window.__liveSuggestionAction = async function (suggestionId, action, cardEl) {
        if (!suggestionId) return;
        try {
          const fn = action === 'use' ? api.useCallSuggestion : api.dismissCallSuggestion;
          const res = await fn(suggestionId);
          if (res.ok) {
            if (cardEl) {
              cardEl.style.opacity = '0.5';
              cardEl.style.pointerEvents = 'none';
              const tag = document.createElement('div');
              tag.className = 'text-[.65rem] font-bold text-emerald-600 mt-1';
              tag.textContent = action === 'use' ? '✓ 사용됨' : '✓ 닫음';
              cardEl.appendChild(tag);
            }
          } else if (res.status === 409) {
            if (cardEl) {
              cardEl.style.opacity = '0.5';
              const tag = document.createElement('div');
              tag.className = 'text-[.65rem] font-bold text-amber-600 mt-1';
              tag.textContent = '이미 처리됨';
              cardEl.appendChild(tag);
            }
          } else {
            console.warn('[live] suggestion action', res.status);
          }
        } catch (err) {
          console.warn('[live] suggestion action failed', err);
        }
      };

      // ─── post-start kickoff ───
      // Poll callState.status until 'live' (or terminal) and then run
      // the per-call hydration once. The boot script in the IIFE above
      // sets callState.status = 'live' inside the async await chain, so
      // a one-shot post-frame check is enough.
      function whenLive(callback, attempts) {
        if (attempts > 50) return; // ~5 seconds @100ms
        if (callState.status === 'live' && callState.callId) {
          callback();
          return;
        }
        if (callState.status === 'failed' || callState.status === 'ended') return;
        setTimeout(() => whenLive(callback, attempts + 1), 100);
      }
      whenLive(async () => {
        await hydrateChecklistAfterStart();
        startHeartbeat();
        updateLiveCallStateSnapshot();
      }, 0);

      // Stop heartbeat on end_call / page unload / failure.
      const origEndBtn = document.getElementById('endCallBtn');
      if (origEndBtn) {
        origEndBtn.addEventListener('click', () => {
          stopHeartbeat();
        });
      }
      window.addEventListener('beforeunload', stopHeartbeat);

      // ─── dev/e2e snapshot ───
      function updateLiveCallStateSnapshot() {
        window.__liveCallState = {
          callId: callState.callId,
          status: callState.status,
          customerId: callState.customerId,
          checklist: {
            total: callState.checklist.length,
            done: callState.checklist.filter((x) => x.status === 'done').length,
          },
          heartbeat: {
            lastSeenAt: callState.heartbeat.lastSeenAt,
            lastError: callState.heartbeat.lastError,
          },
        };
      }
      updateLiveCallStateSnapshot();
      // Re-publish whenever the status changes; the simplest mechanism
      // is a setInterval, but to keep CPU quiet we re-publish on visible
      // mutations only. The heartbeat tick and renderChecklist already
      // call updateLiveCallStateSnapshot.
    })();
  </script>
</body>

</html>
