<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>비밀번호 재설정 — Kloser</title>
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
  <link rel="stylesheet" as="style" crossorigin
    href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <script>
    tailwind.config = { theme: { extend: { fontFamily: {
      sans: ['Pretendard Variable', 'Pretendard', 'Inter', 'system-ui', 'sans-serif'] } } } };
  </script>
  <style>
    html, body {
      min-height: 100%;
      font-family: 'Pretendard Variable', 'Pretendard', 'Inter', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased; letter-spacing: -0.01em; color: rgb(15 23 42);
    }
    body {
      background:
        radial-gradient(1200px 600px at 80% -10%, rgba(37, 99, 235, 0.08), transparent 60%),
        radial-gradient(900px 600px at -10% 110%, rgba(6, 182, 212, 0.08), transparent 60%),
        #f8fafc;
    }
    .g-text { background: linear-gradient(120deg, #2563eb 0%, #06b6d4 100%);
              -webkit-background-clip: text; background-clip: text; color: transparent; }
    .field {
      width: 100%; padding: 11px 13px; font-size: .9rem;
      border: 1px solid rgb(226 232 240); border-radius: 10px; background: white;
      transition: border-color .15s, box-shadow .15s;
    }
    .field:focus { outline: none; border-color: rgb(37 99 235);
                   box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12); }
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center;
      width: 100%; padding: 12px 16px;
      border-radius: 10px; background: rgb(37 99 235); color: white;
      font-size: .9rem; font-weight: 700;
      box-shadow: 0 4px 12px -4px rgba(37, 99, 235, .4);
    }
    .btn-primary:hover:not(:disabled) { background: rgb(29 78 216); }
    .btn-primary:disabled { opacity: .6; cursor: not-allowed; }
    .card { background: white; border: 1px solid rgb(226 232 240); border-radius: 16px;
            box-shadow: 0 1px 3px 0 rgba(15,23,42,0.04), 0 12px 32px -16px rgba(15,23,42,0.08); }
  </style>
</head>

<body>
  <main class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-md">
      <div class="flex items-center justify-center gap-2 mb-6">
        <span class="text-[1.35rem] font-black tracking-tight"><span class="g-text">Kloser</span></span>
      </div>

      <!-- Form -->
      <form id="forgot-form" class="card p-7 sm:p-8" novalidate>
        <h1 class="text-[1.25rem] font-black tracking-tight">비밀번호 재설정</h1>
        <p class="mt-1 text-[.82rem] text-slate-500">
          가입한 이메일을 입력하면 재설정 안내 메일을 보내드립니다.
        </p>
        <div class="mt-6">
          <label for="email" class="block text-[.78rem] font-bold text-slate-700 mb-1.5">이메일</label>
          <input id="email" type="email" name="email" required minlength="3" maxlength="320"
                 class="field" placeholder="you@company.com" autocomplete="email">
        </div>
        <button id="submit" type="submit" class="btn-primary mt-6">재설정 안내 메일 보내기</button>
        <div id="error" hidden
             class="mt-4 px-3 py-2.5 rounded-lg bg-rose-50 border border-rose-200 text-rose-700 text-[.8rem]"></div>
      </form>

      <!-- Result -->
      <div id="result" hidden class="card p-7 sm:p-8 text-center">
        <div class="mx-auto w-14 h-14 rounded-full bg-blue-100 flex items-center justify-center mb-4">
          <svg width="28" height="28" fill="none" stroke="rgb(37 99 235)" stroke-width="2" viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <path d="m22 6-10 7L2 6"/>
          </svg>
        </div>
        <h2 class="text-[1.05rem] font-black tracking-tight mb-2">메일을 보냈습니다</h2>
        <p class="text-[.85rem] text-slate-500 leading-relaxed">
          입력하신 이메일로 계정이 존재한다면 재설정 안내 메일이 도착합니다.
          1시간 내에 링크를 사용해주세요.
        </p>
        <a href="login.html" class="inline-block mt-6 text-[.85rem] font-bold text-blue-600 hover:underline">로그인으로 돌아가기</a>
      </div>

      <p class="mt-5 text-center text-[.78rem] text-slate-500" id="back-link-bottom">
        <a href="login.html" class="font-bold text-blue-600 hover:underline">← 로그인으로 돌아가기</a>
      </p>
    </div>
  </main>

  <script src="api.js"></script>
  <script>
    (function () {
      'use strict';
      const form = document.getElementById('forgot-form');
      const result = document.getElementById('result');
      const emailInput = document.getElementById('email');
      const submitBtn = document.getElementById('submit');
      const errorDiv = document.getElementById('error');
      const backLink = document.getElementById('back-link-bottom');

      function showError(msg) { errorDiv.textContent = msg; errorDiv.hidden = false; }
      function hideError() { errorDiv.hidden = true; errorDiv.textContent = ''; }

      form.addEventListener('submit', async (ev) => {
        ev.preventDefault();
        hideError();
        submitBtn.disabled = true;
        submitBtn.textContent = '전송 중…';
        try {
          const { status } = await window.kloserApi.requestPasswordReset(
            emailInput.value.trim().toLowerCase(),
          );
          if (status === 200) {
            form.hidden = true;
            backLink.hidden = true;
            result.hidden = false;
          } else {
            showError('일시적인 오류입니다. 잠시 후 다시 시도해주세요.');
          }
        } catch (err) {
          console.error('[forgot]', err);
          showError('네트워크 오류로 요청할 수 없습니다.');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = '재설정 안내 메일 보내기';
        }
      });
    })();
  </script>
</body>
</html>
